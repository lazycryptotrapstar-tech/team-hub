            const container = document.getElementById('team-switcher');
            container.innerHTML = Object.keys(TEAMS).map(id => {

                const activeClasses = "bg-primary text-white shadow-lg border-primary";
                const inactiveClasses = "bg-white text-gray-600 border-gray-300 hover:bg-gray-50 opacity-70 hover:opacity-100";
                return `<button onclick="switchTeam('${id}')" class="px-6 py-2 rounded-full font-black text-xs uppercase tracking-widest border-2 transition-all ${isActive ? activeClasses : inactiveClasses}">${TEAMS[id].branding.name}</button>`;
            }).join('');
        }

            currentTeamId = teamId;
            TEAM_CONFIG = TEAMS[teamId];
            applyTheme();
            renderTeamSwitcher();
            render();

            document.documentElement.style.setProperty('--primary', TEAM_CONFIG.branding.primaryColor);

            return `${styleClass} ${extraClass}`;

                                <h3 class="text-primary font-black uppercase text-sm mb-4 border-b pb-2 flex justify-between">
                                    Season Record <span>${TEAM_CONFIG.record.wins}-${TEAM_CONFIG.record.losses}-${TEAM_CONFIG.record.draws}</span>
                                </h3>
                                <div class="grid grid-cols-3 gap-2">
                                    <div class="bg-green-50 p-3 md:p-4 rounded-lg text-center border border-green-200">
                                        <p class="text-[9px] md:text-[10px] font-bold text-green-700 uppercase">Wins</p>
                                        <p class="text-2xl md:text-3xl font-black text-green-800">${TEAM_CONFIG.record.wins}</p>
                                    </div>
                                    <div class="bg-red-50 p-3 md:p-4 rounded-lg text-center border border-red-200">
                                        <p class="text-[9px] md:text-[10px] font-bold text-red-700 uppercase">Losses</p>
                                        <p class="text-2xl md:text-3xl font-black text-red-800">${TEAM_CONFIG.record.losses}</p>
                                    </div>
                                    <div class="bg-gray-50 p-3 md:p-4 rounded-lg text-center border border-gray-200">
                                        <p class="text-[9px] md:text-[10px] font-bold text-gray-700 uppercase">Draws</p>
                                        <p class="text-2xl md:text-3xl font-black text-gray-800">${TEAM_CONFIG.record.draws}</p>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h3 class="text-primary font-black uppercase text-sm mb-4 border-b pb-2">League Status</h3>
                                <div class="space-y-2">
                                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border-l-4 border-primary">
                                        <span class="text-[11px] md:text-xs font-bold uppercase text-gray-500">League Rank</span>
                                        <span class="text-primary font-black text-base md:text-lg">${TEAM_CONFIG.league.rank} <span class="text-[10px] md:text-xs text-gray-600 font-bold ml-0.5 md:ml-1">of ${TEAM_CONFIG.league.totalTeams}</span></span>
                                    </div>
                                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                        <span class="text-[11px] md:text-xs font-bold uppercase text-gray-500">Total Points</span>
                                        <span class="text-primary font-black text-base md:text-lg">${TEAM_CONFIG.league.points}</span>
                                    </div>
                                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                        <span class="text-[11px] md:text-xs font-bold uppercase text-gray-500">PPG</span>
                                        <span class="text-primary font-black text-base md:text-lg">${TEAM_CONFIG.league.ppg}</span>
                                    </div>
                                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                        <span class="text-[11px] md:text-xs font-bold uppercase text-gray-500">Diff</span>
                                        <span class="text-primary font-black text-base md:text-lg text-green-600">${TEAM_CONFIG.league.goalDiff}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-auto p-4 md:p-5 border-2 border-gray-100 rounded-xl bg-white shadow-sm flex flex-col justify-center">
                                <h4 class="font-black text-[11px] md:text-xs uppercase text-primary mb-4 tracking-widest text-center">Scoring Breakdown</h4>
                                <div class="space-y-4">
                                    <div>
                                        <div class="flex justify-between text-[11px] md:text-xs font-bold mb-1"><span>FOR</span><span class="text-green-600">${TEAM_CONFIG.goals.for}</span></div>
                                        <div class="progress-bar"><div class="progress-fill bg-green-500" style="width: ${gfWidth}%"></div></div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-[11px] md:text-xs font-bold mb-1"><span>AGAINST</span><span>${TEAM_CONFIG.goals.against}</span></div>
                                        <div class="progress-bar"><div class="progress-fill bg-blue-400" style="width: ${gaWidth}%"></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="md:col-span-2 flex flex-col h-full">
                            <div class="mb-4">
                                <h3 class="text-primary font-black uppercase text-sm mb-3 border-b pb-2">Match History</h3>
                                <div class="overflow-hidden rounded-xl border border-gray-100 bg-white">
                                    <table class="w-full text-left text-[10px] md:text-xs">
                                        <thead class="bg-gray-50 text-gray-500 font-black uppercase tracking-wider">
                                            <tr><th class="px-2 md:px-3 py-2">Date</th><th class="px-2 md:px-3 py-2">Opponent</th><th class="px-2 md:px-3 py-2 text-center">Score</th><th class="px-2 md:px-3 py-2 text-center">Res</th></tr>
                                        </thead>
                                        <tbody class="divide-y divide-gray-100">
                                            ${matchRowsHtml}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="mt-auto p-4 sm:p-5 bg-white rounded-xl shadow-sm border-2 border-secondary flex flex-col justify-center gap-3">
                                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 sm:gap-0">
                                    <div class="space-y-1 w-full sm:w-auto">
                                        <p class="text-[10px] sm:text-xs font-black uppercase text-primary tracking-widest">Next Match Details</p>
                                        <h4 class="text-lg sm:text-xl font-black uppercase text-gray-900 leading-tight">#${TEAM_CONFIG.nextMatch.oppRank} ${TEAM_CONFIG.nextMatch.oppName}</h4>
                                        <div class="text-[10px] sm:text-xs font-bold text-gray-500 uppercase mt-1">
                                            <span class="bg-gray-100 px-2 py-1 rounded inline-block text-gray-700">${TEAM_CONFIG.nextMatch.date} • ${TEAM_CONFIG.nextMatch.time}</span>
                                        </div>
                                    </div>
                                    <div class="w-full sm:w-auto text-left sm:text-right border-t sm:border-t-0 border-gray-100 sm:border-l-2 sm:border-gray-100 pt-3 sm:pt-0 pl-0 sm:pl-6 py-1 sm:py-2">
                                        <p class="text-[10px] sm:text-[11px] font-black text-gray-400 uppercase mb-0.5 sm:mb-1">Opponent Stats</p>
                                        <p class="text-base sm:text-lg font-black text-primary leading-tight">Rank: ${TEAM_CONFIG.nextMatch.oppRank} <span class="text-[9px] sm:text-[10px] text-gray-500 font-bold ml-1">of ${TEAM_CONFIG.nextMatch.oppTotalTeams}</span></p>
                                        <p class="text-[11px] sm:text-xs font-bold text-gray-600 mt-0.5 sm:mt-1">Record: ${TEAM_CONFIG.nextMatch.oppRecord}</p>
                                    </div>
                                </div>
                                <div class="pt-3 border-t border-gray-100">
                                    <p class="text-[9px] sm:text-[10px] font-bold text-gray-400 uppercase mb-1.5 tracking-widest">Opponent's Last Match</p>
                                    <div class="flex justify-between items-center bg-gray-50 px-2 sm:px-3 py-2 rounded-lg text-[10px] sm:text-xs border border-gray-100 gap-2">
                                        <span class="font-medium whitespace-nowrap">${TEAM_CONFIG.nextMatch.lastMatch.date}</span>
                                        <span class="flex-1 leading-tight truncate"><span class="text-gray-400 font-black mr-1">#${TEAM_CONFIG.nextMatch.lastMatch.rank}</span> ${TEAM_CONFIG.nextMatch.lastMatch.opp}</span>
                                        <span class="font-bold text-center whitespace-nowrap">${TEAM_CONFIG.nextMatch.lastMatch.score}</span>
                                        <span class="font-black text-center whitespace-nowrap ${TEAM_CONFIG.nextMatch.lastMatch.res === 'W' ? 'result-w' : (TEAM_CONFIG.nextMatch.lastMatch.res === 'L' ? 'result-l' : 'result-d')}">${TEAM_CONFIG.nextMatch.lastMatch.res}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    ${generateFooterHTML('Official Data Verification')}
                </div>
            `;
        }

        function renderOutlook(container) {
            const r = TEAM_CONFIG.record;
            const l = TEAM_CONFIG.league;
            const availablePts = TEAM_CONFIG.remainingSchedule.length * 3;
            const maxPts = parseInt(l.points) + availablePts;

            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl overflow-hidden border border-gray-200">
                    ${generateHeaderHTML('Mid-Season Analysis & Outlook')}
                    
                    <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
                        
                        <div class="space-y-6">
                            <div>
                                <h3 class="text-primary font-black uppercase text-base md:text-lg mb-2 border-b-2 border-gray-100 pb-2">The Story So Far</h3>
                                <p class="text-[13px] md:text-sm text-gray-700 leading-relaxed mb-4">
                                    Sitting at a <strong>${r.wins}-${r.losses}-${r.draws}</strong> record, ${TEAM_CONFIG.branding.name} holds the #${l.rank} spot in a fiercely competitive ${l.totalTeams}-team division. All eyes are now on our upcoming clash against <strong>#${TEAM_CONFIG.nextMatch.oppRank} ${TEAM_CONFIG.nextMatch.oppName}</strong>. Securing 3 crucial points in this pivotal matchup would drastically shift the standings, potentially allowing us to leapfrog close rivals and build critical momentum for a late-season podium push.
                                </p>
                            </div>
                            
                            <div>
                                <h3 class="text-primary font-black uppercase text-base md:text-lg mb-2 border-b-2 border-gray-100 pb-2">The Differential Edge</h3>
                                <p class="text-[13px] md:text-sm text-gray-700 leading-relaxed mb-4">
                                    A true indicator of a team's strength is scoring differential. We currently hold a <strong>${l.goalDiff} Diff (${TEAM_CONFIG.goals.for} For, ${TEAM_CONFIG.goals.against} Against)</strong>, proving we are competitive in nearly every match we play.
                                </p>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div>
                                <h3 class="text-primary font-black uppercase text-base md:text-lg mb-2 border-b-2 border-gray-100 pb-2 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-1">
                                    <span>Path to the Podium</span>
                                </h3>
                                <p class="text-[13px] md:text-sm text-gray-700 leading-relaxed mb-4">
                                    With ${l.points} points currently secured, the math to climb the table is entirely possible. With <strong>${TEAM_CONFIG.remainingSchedule.length} matches remaining</strong>, there are ${availablePts} total points left on the table.
                                </p>
                                
                                <div class="space-y-2 md:space-y-3">
                                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg border-l-4 border-gray-400">
                                        <span class="text-[10px] md:text-xs font-bold uppercase text-gray-600 leading-tight">Current Points</span>
                                        <span class="text-lg md:text-xl font-black text-gray-800 shrink-0">${l.points}</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-yellow-50 p-3 rounded-lg border-l-4 border-secondary">
                                        <div class="flex flex-col">
                                            <span class="text-[10px] md:text-xs font-bold uppercase text-yellow-800 leading-tight">Available Points</span>
                                            <span class="text-[9px] md:text-[10px] text-yellow-700 font-medium">(${TEAM_CONFIG.remainingSchedule.length} Games)</span>
                                        </div>
                                        <span class="text-lg md:text-xl font-black text-yellow-800 shrink-0">${availablePts}</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-green-50 p-3 rounded-lg border-l-4 border-green-500 shadow-sm">
                                        <span class="text-[10px] md:text-xs font-bold uppercase text-green-800 leading-tight">Max Potential Pts</span>
                                        <span class="text-xl md:text-2xl font-black text-green-800 shrink-0">${maxPts}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                    ${generateFooterHTML('Team Analysis & Projections')}
                </div>
            `;
        }

        function renderSchedule(container) {
            const scheduleRows = TEAM_CONFIG.remainingSchedule.map((m, index) => {
                const bgClass = index === 0 ? 'bg-yellow-50 font-bold text-gray-900' : '';
                const rankHtml = m.rank && m.rank !== "-" ? `<span class="text-gray-400 font-black mr-1">#${m.rank}</span>` : '';
                return `
                    <tr class="${bgClass}">
                        <td class="px-2 md:px-4 py-3 font-medium border-b border-gray-100 whitespace-nowrap">${m.date}</td>
                        <td class="px-2 md:px-4 py-3 border-b border-gray-100 leading-tight">${rankHtml} ${m.opp}</td>
                        <td class="px-2 md:px-4 py-3 text-center font-bold border-b border-gray-100 whitespace-nowrap">${m.time}</td>
                        <td class="px-2 md:px-4 py-3 text-right font-bold text-gray-500 border-b border-gray-100 leading-tight text-[10px] md:text-xs">${m.loc}</td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl overflow-hidden border border-gray-200">
                    ${generateHeaderHTML('Remaining Season Schedule')}
                    
                    <div class="p-4 md:p-8 min-h-[400px]">
                        <h3 class="text-primary font-black uppercase text-sm md:text-base mb-4 border-b pb-2">Upcoming Matches</h3>
                        <div class="overflow-hidden rounded-xl border border-gray-100 bg-white shadow-sm">
                            <table class="w-full text-left text-[10px] md:text-sm">
                                <thead class="bg-gray-50 text-gray-500 font-black uppercase tracking-wider">
                                    <tr>
                                        <th class="px-2 md:px-4 py-3">Date</th>
                                        <th class="px-2 md:px-4 py-3">Opponent</th>
                                        <th class="px-2 md:px-4 py-3 text-center">Time</th>
                                        <th class="px-2 md:px-4 py-3 text-right">Location</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    ${scheduleRows}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    ${generateFooterHTML('Official Schedule Details')}
                </div>
            `;
        }

        // INITIAL RENDER
        applyTheme();
        renderTeamSwitcher();
        render();
    </script>
