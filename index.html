<!DOCTYPE html>
<html lang="en">
<head>
    <title data-id="th-modified">Team Central</title>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%224%22%20fill%3D%22%2300234b%22/%3E%3Ctext%20x%3D%2216%22%20y%3D%2223%22%20font-family%3D%22Arial%20Black%2Csans-serif%22%20font-size%3D%2222%22%20font-weight%3D%22900%22%20text-anchor%3D%22middle%22%20fill%3D%22%23ffcc00%22%3ES%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%224%22%20fill%3D%22%2300234b%22/%3E%3Ctext%20x%3D%2216%22%20y%3D%2223%22%20font-family%3D%22Arial%20Black%2Csans-serif%22%20font-size%3D%2222%22%20font-weight%3D%22900%22%20text-anchor%3D%22middle%22%20fill%3D%22%23ffcc00%22%3ES%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Sting Soccer – Team Hub" data-id="th-modified">
    <meta name="description" content="Sting Soccer Team Report Card" data-id="th-modified">
    <meta property="og:type" content="website" data-id="th-modified">
    <script src="https://cdn.tailwindcss.com/"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:'var(--primary)',secondary:'var(--secondary)'}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#00234b;--secondary:#ffcc00;}
        *,*::before,*::after{box-sizing:border-box;}
        body{font-family:'Barlow',sans-serif;background-color:#0d1f38;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,204,0,0.04) 39px,rgba(255,204,0,0.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,204,0,0.04) 39px,rgba(255,204,0,0.04) 40px);margin:0;padding:16px 12px 40px;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
        @media print{body{background:white;padding:0;}.no-print{display:none!important;}.print-container{box-shadow:none!important;border:none!important;width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}}
        .site-header{width:100%;max-width:1000px;display:flex;align-items:center;justify-content:space-between;padding:0 0 14px;}
        .site-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:25px;letter-spacing:3px;text-transform:uppercase;color:var(--secondary);text-shadow:0 0 30px rgba(255,204,0,0.3);}
        .site-logo span{color:rgba(255,255,255,0.35);font-weight:400;}
        .team-switcher-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 20px;border-radius:2px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;}
        .team-switcher-btn:hover{border-color:rgba(255,204,0,0.4);color:rgba(255,255,255,0.8);}
        .team-switcher-btn.active{background:var(--secondary);color:var(--primary);border-color:var(--secondary);box-shadow:0 0 20px rgba(255,204,0,0.25);}
        .toolbar{width:100%;max-width:1000px;background:var(--primary);border-top:3px solid var(--secondary);border-radius:0 0 4px 4px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;overflow-x:auto;margin-top:12px;}
        .tab-nav{display:flex;gap:0;}
        .tab-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.45);border:none;background:none;padding:16px 16px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.15s;}
        .tab-btn:hover{color:rgba(255,255,255,0.8);}
        .tab-btn.tab-active{color:var(--secondary);border-bottom-color:var(--secondary);}
        .pdf-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;background:var(--secondary);color:var(--primary);border:none;padding:7px 16px;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
        .pdf-btn:hover{background:#ffe033;}
        .main-card{background:#f5f0e8;border-radius:0 0 6px 6px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
        .card-header{background:var(--primary);padding:28px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;border-bottom:4px solid var(--secondary);position:relative;overflow:hidden;}
        .card-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 18px,rgba(255,255,255,0.015) 18px,rgba(255,255,255,0.015) 36px);}
        .card-header::after{content:attr(data-watermark);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:130px;line-height:1;color:rgba(255,255,255,0.03);position:absolute;right:-10px;bottom:-20px;letter-spacing:-4px;pointer-events:none;}
        .header-team-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:clamp(24px,4vw,36px);letter-spacing:1px;text-transform:uppercase;color:white;line-height:1;z-index:1;position:relative;}
        .header-subtitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--secondary);margin-top:5px;}
        .header-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;background:var(--secondary);color:var(--primary);padding:3px 10px;border-radius:2px;margin-top:8px;}
        .header-right{text-align:right;z-index:1;flex-shrink:0;}
        .header-division-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);}
        .header-division{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;letter-spacing:1px;text-transform:uppercase;color:white;line-height:1.2;}
        .header-record{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:25px;color:var(--secondary);margin-top:4px;}
        .section-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--primary);border-bottom:2px solid var(--secondary);padding-bottom:6px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
        .section-title span{color:rgba(0,35,75,0.45);font-weight:600;letter-spacing:1px;}
        .record-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
        .record-card{border-radius:3px;padding:12px 8px;text-align:center;border-top:4px solid;}
        .record-card.wins{background:#e8f5ee;border-color:#16a34a;}
        .record-card.losses{background:#fdf0f0;border-color:#dc2626;}
        .record-card.draws{background:#fefce8;border-color:#ca8a04;}
        .record-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;}
        .record-label.wins{color:#15803d;}.record-label.losses{color:#b91c1c;}.record-label.draws{color:#78350f;}
        .record-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:42px;line-height:1;margin-top:2px;}
        .record-num.wins{color:#166534;}.record-num.losses{color:#991b1b;}.record-num.draws{color:#78350f;}
        .rank-strip{background:var(--primary);border-radius:3px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
        .rank-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);}
        .rank-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;color:var(--secondary);line-height:1;}
        .rank-sub{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:rgba(255,255,255,0.35);font-weight:600;}
        .stat-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:white;border-left:3px solid var(--secondary);border-radius:0 3px 3px 0;margin-bottom:6px;}
        .stat-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,35,75,0.55);font-weight:700;}
        .stat-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:23px;color:var(--primary);}
        .stat-val.gold{color:#b45309;}
        .progress-wrap{margin-bottom:10px;}
        .progress-header{display:flex;justify-content:space-between;margin-bottom:5px;}
        .progress-header span{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:rgba(0,35,75,0.6);}
        .progress-track{height:8px;background:rgba(0,35,75,0.08);border-radius:1px;overflow:hidden;}
        .progress-fill{height:100%;border-radius:1px;}
        .match-table-wrap{background:white;border-radius:3px;overflow:hidden;border:1px solid rgba(0,35,75,0.07);}
        .match-table{width:100%;border-collapse:collapse;font-size:12px;}
        .match-table thead tr{background:var(--primary);}
        .match-table thead th{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.55);font-weight:700;padding:10px 10px;text-align:left;}
        .match-table thead th.center{text-align:center;}
        .match-table tbody tr{border-bottom:1px solid rgba(0,35,75,0.05);transition:background 0.1s;}
        .match-table tbody tr:hover{background:rgba(0,35,75,0.03);}
        .match-table tbody tr.highlight-row{background:rgba(255,204,0,0.1);font-weight:600;}
        .match-table td{padding:9px 10px;font-size:14px;color:#1e293b;}
        .match-table td.center{text-align:center;}
        .date-cell{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.5px;color:rgba(0,35,75,0.5);font-weight:700;white-space:nowrap;}
        .opp-rank{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:rgba(0,35,75,0.3);margin-right:3px;}
        .score-cell{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;text-align:center;white-space:nowrap;}
        .res-badge{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:2px;}
        .res-W{background:#dcfce7;color:#15803d;}.res-L{background:#fee2e2;color:#b91c1c;}.res-D{background:#fef3c7;color:#92400e;}
        .next-match-card{background:var(--primary);border-radius:3px;padding:18px 20px;border-left:5px solid var(--secondary);}
        .next-match-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--secondary);font-weight:700;margin-bottom:4px;}
        .next-match-opp{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:clamp(15px,2.5vw,21px);text-transform:uppercase;color:white;line-height:1.1;}
        .next-match-meta{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:0.5px;color:rgba(255,255,255,0.45);font-weight:600;margin-top:5px;}
        .opp-stats-rank{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:34px;color:var(--secondary);line-height:1;}
        .opp-stats-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.35);font-weight:700;}
        .standings-table{width:100%;border-collapse:collapse;font-size:12px;}
        .standings-table thead tr{background:var(--primary);}
        .standings-table thead th{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:700;padding:11px 10px;text-align:center;}
        .standings-table thead th:nth-child(2){text-align:left;}
        .standings-table tbody tr{border-bottom:1px solid rgba(0,35,75,0.06);}
        .standings-table tbody tr:hover{background:rgba(0,35,75,0.03);}
        .standings-table tbody tr.current-team{background:rgba(255,204,0,0.1);border-left:3px solid var(--secondary);font-weight:700;}
        .standings-table td{padding:10px 10px;text-align:center;font-size:14px;}
        .standings-table td:nth-child(2){text-align:left;}
        .pts-cell{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--primary);}
        .gd-pos{color:#15803d;font-weight:700;}.gd-neg{color:#b91c1c;font-weight:700;}
        .schedule-table{width:100%;border-collapse:collapse;}
        .schedule-table thead tr{background:var(--primary);}
        .schedule-table thead th{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:700;padding:11px 14px;text-align:left;}
        .schedule-table tbody tr{border-bottom:1px solid rgba(0,35,75,0.06);}
        .schedule-table tbody tr.next-up{background:rgba(255,204,0,0.1);font-weight:700;border-left:3px solid var(--secondary);}
        .schedule-table td{padding:11px 14px;font-size:14px;}
        .schedule-date{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--primary);white-space:nowrap;}
        .schedule-time{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:rgba(0,35,75,0.55);text-align:center;white-space:nowrap;}
        .schedule-loc{font-size:13px;color:rgba(0,35,75,0.45);text-align:right;}
        .outlook-stat-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:3px;margin-bottom:6px;}
        .outlook-stat-row.pts{background:white;border-left:4px solid rgba(0,35,75,0.2);}
        .outlook-stat-row.avail{background:rgba(255,204,0,0.1);border-left:4px solid var(--secondary);}
        .outlook-stat-row.max{background:#e8f5ee;border-left:4px solid #16a34a;}
        .outlook-stat-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
        .outlook-stat-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;}
        .outlook-section-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;text-transform:uppercase;letter-spacing:1px;color:var(--primary);border-bottom:2px solid var(--secondary);padding-bottom:6px;margin-bottom:12px;}
        .outlook-prose{font-size:15px;line-height:1.7;color:#374151;}
        .tactic-subnav{background:#001530;border-bottom:1px solid rgba(255,255,255,0.07);padding:10px 20px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
        .tactic-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;border-radius:2px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.45);cursor:pointer;transition:all 0.15s;}
        .tactic-btn:hover{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.3);}
        .tactic-btn.active{background:var(--secondary);color:var(--primary);border-color:var(--secondary);font-weight:900;}
        .tactical-field{background-color:#1a6b35;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,0.04),rgba(255,255,255,0.04) 10%,transparent 10%,transparent 20%);border:3px solid rgba(255,255,255,0.65);border-radius:4px;position:relative;overflow:hidden;}
        .player-dot{position:absolute;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.4);transition:all 0.8s cubic-bezier(0.4,0,0.2,1);z-index:20;}
        .dimmed{opacity:0.28;transform:translate(-50%,-50%) scale(0.82)!important;filter:grayscale(60%);}
        .highlighted{opacity:1;transform:translate(-50%,-50%) scale(1.08)!important;}
        .card-footer{background:var(--primary);padding:14px 32px;display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:16px;border-top:2px solid rgba(255,204,0,0.18);}
        .footer-verify{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);}
        .footer-date{font-family:'Barlow',sans-serif;font-size:13px;color:rgba(255,255,255,0.45);margin-top:2px;}
        .footer-motto{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.28);text-align:right;}
        .footer-website{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--secondary);opacity:0.65;margin-top:2px;text-align:right;}
        .content-area{padding:28px 32px;}
        .tactic-role{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;color:var(--primary);width:52px;flex-shrink:0;text-align:center;line-height:1;}
        .tactic-role.mid{color:#b45309;}.tactic-role.att{color:#b91c1c;}
        .tactic-heading{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--primary);margin-bottom:3px;}
        .tactic-body{font-size:14px;color:#374151;line-height:1.6;}
        .tactic-section-badge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:2px;margin-bottom:16px;display:inline-block;}
        .tactic-section-badge.overview,.tactic-section-badge.defense{background:rgba(0,35,75,0.07);color:var(--primary);}
        .tactic-section-badge.midfield{background:rgba(255,204,0,0.18);color:#7c5900;}
        .tactic-section-badge.attack{background:rgba(220,38,38,0.07);color:#b91c1c;}
        
        /* ===== RESPONSIVE ===== */

        /* Tablet — 768px */
        @media(max-width:768px){
            /* Stack stats grid */
            .stats-grid{grid-template-columns:1fr !important; gap:16px !important;}

            /* Match history: allow horizontal scroll */
            .match-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
            .match-table{min-width:340px;}

            /* Next match: wrap top row so name doesn't get cut */
            .nm-top-row{flex-wrap:wrap;gap:10px;}
            .next-match-opp{font-size:17px !important;}

            /* Last match row: tighter */
            .nm-last-row{flex-wrap:wrap;gap:6px;}

            /* Right col scoring boxes: side by side */
            .stat-item{padding:8px 10px;}
        }

        /* Mobile — 640px */
        @media(max-width:640px){
            body{padding:8px 8px 32px;}
            .content-area{padding:16px 12px;}
            .card-header{padding:16px 12px;}
            .card-footer{padding:12px 12px;flex-direction:column;gap:8px;text-align:center;}
            .footer-motto,.footer-website{text-align:center;}
            .toolbar{padding:0 8px;}
            .tab-nav{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
            .tab-nav::-webkit-scrollbar{display:none;}
            .tab-btn{padding:14px 10px;font-size:11px;letter-spacing:1px;white-space:nowrap;}

            /* Header: stack on mobile */
            .card-header{flex-direction:column;align-items:flex-start;gap:8px;}
            .header-right{width:100%;display:flex;justify-content:space-between;align-items:center;}
            .header-team-name{font-size:26px;}
            .header-division{font-size:16px;}
            .header-record{font-size:18px;margin-top:0;}

            /* Record cards: keep 3-col but tighter */
            .record-grid{gap:6px;}
            .record-num{font-size:32px !important;}
            .record-card{padding:10px 6px;}

            /* Stats layout: single column */
            .stats-grid{grid-template-columns:1fr !important; gap:14px !important;}

            /* Match table: scrollable, readable */
            .match-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
            .match-table{min-width:320px;font-size:12px;}
            .match-table td{padding:7px 8px;font-size:12px;}
            .match-table thead th{padding:8px 8px;font-size:10px;}
            .date-cell{font-size:11px;}
            .score-cell{font-size:13px !important;}

            /* Next match: full width, no clipping */
            .next-match-card{padding:14px 14px;}
            .nm-top-row{flex-direction:column;gap:8px;}
            .next-match-opp{font-size:16px !important;}
            .opp-stats-rank{font-size:22px !important;}
            .nm-last-row{flex-direction:column;gap:4px;align-items:flex-start;}
            .next-match-meta{font-size:12px;}

            /* Standings */
            .standings-table td{padding:7px 6px;font-size:11px;}
            .standings-table thead th{padding:8px 6px;font-size:9px;letter-spacing:1px;}
            .pts-cell{font-size:14px !important;}

            /* Schedule */

    function getTacticDesc(v){const D={overview:{badge:'overview',label:'4-3-3 Overview',items:[{role:'DEF',rc:'',t:'The Shield',b:'Maintain a high line, win 1v1 battles, and use the fullbacks to provide width in the attack.'},{role:'MID',rc:'mid',t:'Engine Room',b:'Control the center with passing triangles. The #6 anchors while the 8 and 10 create overloads.'},{role:'FWD',rc:'att',t:'Strike Force',b:'Lead the high press. Stretch the pitch wide, isolate defenders, and finish chances in the box.'}]},defense:{badge:'defense',label:'Defense Flow',items:[{role:'1/4/5',rc:'',t:'Playing Out The Back',b:"The CBs split wide to the edges. The GK acts as a pivot to create passing lanes and bypass the first line of pressure."},{role:'2/3',rc:'',t:'Fullback Expansion',b:'Upon winning possession, fullbacks push high and hug the touchline to stretch the opponent and create space inside.'},{role:'6',rc:'mid',t:'Rest Defense',b:'When fullbacks push up, the #6 drops centrally to form a temporary back-three, shielding against counter-attacks.'}]},midfield:{badge:'midfield',label:'Midfield Flow',items:[{role:'6/8/10',rc:'mid',t:'The Triangle',b:'Never stand in a flat line. Always form dynamic triangles so the ball carrier has two passing options at all times.'},{role:'8/10',rc:'mid',t:'Half-Space Dominance',b:"Push into the half-spaces between the opponent's wide and central defenders to turn and create overloads."},{role:'6',rc:'mid',t:'The Pivot',b:'The anchor dictates tempo. If center is blocked, the #6 receives and quickly switches play to the weak side.'}]},attack:{badge:'attack',label:'Attack Flow',items:[{role:'7/9/11',rc:'att',t:'High Press Triggers',b:'The front three trigger an aggressive press when the opponent plays backward or a defender takes a bad touch.'},{role:'2/3',rc:'',t:'Auxiliary Attackers',b:'When possession is secured, fullbacks push wide and high to create 2v1 overloads alongside the wingers.'},{role:'4/5/6',rc:'',t:'High Rest Defense',b:'With fullbacks committed, the CBs and CDM establish a high line near midfield to cover half-spaces.'}]}};const d=D[v];return`<span class="tactic-section-badge ${d.badge}">${d.label}</span>`+d.items.map(i=>`<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:18px;"><div class="tactic-role ${i.rc}">${i.role}</div><div><div class="tactic-heading">${i.t}</div><div class="tactic-body">${i.b}</div></div></div>`).join('');}

    function showApiKeyModal(callback) {

        overlay.className = 'ai-modal-overlay';
        overlay.innerHTML = `
            <div class="apikey-modal">
                <div class="apikey-modal-header">

                    <button class="apikey-submit" onclick="submitApiKey(this, '${callback ? 'cb' : ''}')">Save & Continue</button>
                </div>
            </div>`;
        document.body.appendChild(overlay);

    function submitApiKey(btn, hasCb) {
        const val = document.getElementById('apiKeyInput').value.trim();
        if (!val.startsWith('sk-ant-') && !val.startsWith('sk-')) {
            document.getElementById('apiKeyInput').style.borderColor = '#dc2626';
            return;
        }
        setApiKey(val);
        btn.closest('.ai-modal-overlay').remove();
        if (hasCb && window._apiKeyCb) window._apiKeyCb();
    }

    /* ============================================================
       AI UTILITY
    ============================================================ */
    async function callAI(systemPrompt, userPrompt) {
        const key = getApiKey();
        if (!key) throw new Error('No API key');
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': key,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1024,
                system: systemPrompt,
                messages: [{ role: 'user', content: userPrompt }]
            })
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'API error'); }
        const data = await res.json();
        return data.content[0].text;
    }

    function withApiKey(fn) {
        if (!getApiKey()) { showApiKeyModal(fn); return; }
        fn();
    }

    /* ============================================================
       AI MODAL (generic)
    ============================================================ */
    function showAiModal({ title, promptLabel, placeholder, system, buildPrompt, onUse }) {
        const overlay = document.createElement('div');
        overlay.className = 'ai-modal-overlay';
        overlay.innerHTML = `
            <div class="ai-modal">
                <div class="ai-modal-header">
                    <div class="ai-modal-title">${title}</div>
                    <button class="ai-modal-close" onclick="this.closest('.ai-modal-overlay').remove()">✕</button>
                </div>
                <div class="ai-modal-body">
                    <label class="ai-prompt-label">${promptLabel}</label>
                    <textarea class="ai-prompt-input" id="aiPromptInput" placeholder="${placeholder}"></textarea>
                    <div id="aiResultBox" class="ai-result-box" style="display:none;"></div>
                    <div class="ai-modal-actions">
                        <button class="ai-cancel-btn" onclick="this.closest('.ai-modal-overlay').remove()">Cancel</button>
                        <button class="ai-gen-btn" id="aiGenBtn" onclick="runAiModal(this, ${JSON.stringify(system).replace(/</g,'\\u003c')}, buildPrompt_${Date.now()})">
                            Generate with AI
                        </button>
                        <button class="ai-use-btn" id="aiUseBtn" style="display:none;" onclick="useAiResult(this)">Use This</button>
                    </div>
                </div>
            </div>`;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
        // Store callbacks on overlay element
        overlay._system = system;
        overlay._buildPrompt = buildPrompt;
        overlay._onUse = onUse;

        overlay.querySelector('#aiGenBtn').onclick = async function() {
            const userInput = document.getElementById('aiPromptInput').value.trim();
            if (!userInput) return;
            this.disabled = true;
            this.innerHTML = '<span class="ai-spinner"></span> Generating...';
            const resultBox = document.getElementById('aiResultBox');
            resultBox.style.display = 'none';
            try {
                const prompt = overlay._buildPrompt(userInput);
                const result = await callAI(overlay._system, prompt);
                resultBox.textContent = result;
                resultBox.style.display = 'block';
                document.getElementById('aiUseBtn').style.display = 'inline-block';
            } catch(err) {
                resultBox.textContent = 'Error: ' + err.message;
                resultBox.style.display = 'block';
            }
            this.disabled = false;
            this.textContent = 'Regenerate';
        };

        overlay.querySelector('#aiUseBtn').onclick = function() {
            const text = document.getElementById('aiResultBox').textContent;
            overlay._onUse(text);
            overlay.remove();
        };
    }

        return { type, id, ...MSG_STATE.dms[id] };
    }

    function getMessages(threadKey) {
        const [type, id] = threadKey.split(':');
        if (type === 'channel') return MSG_STATE.channels[id].messages;
        return MSG_STATE.dms[id].messages;
    }

            system: `You are drafting a professional sponsorship outreach email on behalf of ${TEAM_CONFIG.branding.name}, a competitive youth soccer team based in the Dallas/Fort Worth area. The team competes in ${TEAM_CONFIG.branding.league} and is affiliated with ${TEAM_CONFIG.branding.website}. Write a warm, professional, concise email. Include a subject line. Keep it under 180 words. Use plain text formatting with "Subject:" prefix, then a blank line, then the email body. Sign off as "The ${TEAM_CONFIG.branding.name} Coaching Staff".`,
            buildPrompt: (input) => `Sponsor company: ${s.name}. Contact: ${s.contact}. Current status: ${s.status}. ${s.notes ? 'Notes: '+s.notes+'.' : ''}\n\nUser's direction: ${input}\n\nWrite the outreach email.`,
            onUse: (text) => { alert('Email copied to clipboard!\n\n' + text); navigator.clipboard?.writeText(text); }
        });
    }

    function openSponsorPitch(id) {
        const s = SP_STATE.sponsors.find(sp => sp.id === id);
        if (!s) return;
        showAiModal({
            title: '✦ Sponsor Pitch One-Pager',
            promptLabel: 'Key selling points to highlight?',
            placeholder: 'e.g. We have 30+ families, play at UT Dallas, active social media presence...',
            system: `You are creating a concise sponsorship pitch for ${TEAM_CONFIG.branding.name}. Write a compelling pitch document in plain text. Use section headers with dashes. Include: Team Overview, Why Sponsor Us, Sponsorship Tiers, What You Get, and Contact Info. Keep it under 250 words. Be specific and data-driven.`,
            buildPrompt: (input) => {
                const r = TEAM_CONFIG.record;
                return `Team: ${TEAM_CONFIG.branding.name}. League: ${TEAM_CONFIG.branding.league}. Record: ${r.wins}W-${r.losses}L-${r.draws}D. Prospect sponsor: ${s.name}.\n\nHighlights from coach: ${input}\n\nGenerate the pitch one-pager.`;
            },
            onUse: (text) => { alert('Pitch copied to clipboard!'); navigator.clipboard?.writeText(text); }
        });
    }

    applyTheme();renderTeamSwitcher();render();
    </script>
</body>
</html>
