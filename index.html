<!DOCTYPE html>
<html lang="en">
<head>
    <title data-id="th-modified">Team Hub</title>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%224%22%20fill%3D%22%2300234b%22/%3E%3Ctext%20x%3D%2216%22%20y%3D%2223%22%20font-family%3D%22Arial%20Black%2Csans-serif%22%20font-size%3D%2222%22%20font-weight%3D%22900%22%20text-anchor%3D%22middle%22%20fill%3D%22%23ffcc00%22%3ES%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%224%22%20fill%3D%22%2300234b%22/%3E%3Ctext%20x%3D%2216%22%20y%3D%2223%22%20font-family%3D%22Arial%20Black%2Csans-serif%22%20font-size%3D%2222%22%20font-weight%3D%22900%22%20text-anchor%3D%22middle%22%20fill%3D%22%23ffcc00%22%3ES%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Team Hub" data-id="th-modified">
    <meta name="description" content="Team Hub — Season Dashboard" data-id="th-modified">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        /* ===== VARIABLES ===== */
        :root{--primary:#00234b;--secondary:#ffcc00;--silver:#c0c8d4;--silver-dim:#8a94a2;--bg:#0d1f38;--card:#f5f0e8;--radius:6px;}
        *,*::before,*::after{box-sizing:border-box;}

        /* ===== BASE ===== */
        body{font-family:'Nunito', sans-serif;background-color:var(--bg);background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,204,0,0.04) 39px,rgba(255,204,0,0.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,204,0,0.04) 39px,rgba(255,204,0,0.04) 40px);margin:0;padding:16px 12px 80px;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
        @media print{body{background:white;padding:0;}.no-print{display:none!important;}.print-container{box-shadow:none!important;border:none!important;width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}}

        /* ===== SITE HEADER ===== */
        .site-header{width:100%;max-width:1000px;display:flex;align-items:center;justify-content:space-between;padding:0 0 14px;}
        .site-logo{font-family:'Nunito', sans-serif;font-weight:900;font-size:25px;letter-spacing:1px;text-transform:uppercase;color:var(--secondary);text-shadow:0 0 30px rgba(255,204,0,0.3);}
        .site-logo span{color:rgba(255,255,255,0.35);font-weight:400;}
        .team-switcher-btn{font-family:'Nunito', sans-serif;font-weight:700;font-size:14px;letter-spacing:0.5px;text-transform:uppercase;padding:8px 20px;border-radius:2px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;}
        .team-switcher-btn:hover{border-color:rgba(255,204,0,0.4);color:rgba(255,255,255,0.8);}
        .team-switcher-btn.active{background:var(--secondary);color:var(--primary);border-color:var(--secondary);box-shadow:0 0 20px rgba(255,204,0,0.25);}


        /* ===== SEASON PULSE BAR ===== */
        .season-pulse{width:100%;max-width:1000px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:3px;padding:8px 12px;display:flex;align-items:center;gap:0;overflow:hidden;margin-top:10px;flex-wrap:nowrap;}
        .pulse-item{display:flex;align-items:center;gap:5px;padding:0 10px;border-right:1px solid rgba(255,255,255,0.08);flex:1;min-width:0;}
        .pulse-item:first-child{padding-left:0;}
        .pulse-item:last-child{border-right:none;}
        .pulse-icon{font-size:13px;}
        .pulse-label{font-family:'Nunito', sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);}
        .pulse-val{font-family:'Nunito', sans-serif;font-weight:900;font-size:12px;color:var(--secondary);line-height:1.25;word-break:break-word;}
        .pulse-val.silver{color:var(--silver);}
        .pulse-val.white{color:white;}
        /* ===== TOOLBAR (desktop) ===== */
        .toolbar{width:100%;max-width:1000px;background:var(--primary);border-top:3px solid var(--secondary);border-radius:0 0 4px 4px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;overflow-x:auto;margin-top:12px;}
        .tab-nav{display:flex;gap:0;}
        .tab-btn{font-family:'Nunito', sans-serif;font-weight:700;font-size:14px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.45);border:none;background:none;padding:16px 16px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.15s;}
        .tab-btn:hover{color:rgba(255,255,255,0.8);}
        .tab-btn.tab-active{color:var(--secondary);border-bottom-color:var(--secondary);}
        .pdf-btn{font-family:'Nunito', sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;text-transform:uppercase;background:var(--secondary);color:var(--primary);border:none;padding:7px 16px;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
        .pdf-btn:hover{background:#ffe033;}

        /* ===== MAIN CARD ===== */
        .main-card{background:var(--card);border-radius:0 0 var(--radius) var(--radius);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);transition:opacity 0.15s ease;}
        .main-card.switching{opacity:0;}

        /* ===== CARD HEADER / FOOTER ===== */
        .card-header{background:var(--primary);padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px;border-bottom:4px solid var(--secondary);position:relative;overflow:hidden;}
        .card-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 18px,rgba(255,255,255,0.015) 18px,rgba(255,255,255,0.015) 36px);}
        .card-header::after{content:attr(data-watermark);font-family:'Nunito', sans-serif;font-weight:900;font-size:130px;line-height:1;color:rgba(255,255,255,0.03);position:absolute;right:-10px;bottom:-20px;letter-spacing:-4px;pointer-events:none;}
        .header-team-name{font-family:'Nunito', sans-serif;font-weight:900;font-style:italic;font-size:clamp(24px,4vw,36px);letter-spacing:1px;text-transform:uppercase;color:white;line-height:1;z-index:1;position:relative;}
        .header-subtitle{font-family:'Nunito', sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--secondary);margin-top:5px;}
        .header-badge{display:inline-block;font-family:'Nunito', sans-serif;font-weight:700;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;background:var(--secondary);color:var(--primary);padding:3px 10px;border-radius:2px;margin-top:8px;}
        .header-right{text-align:right;z-index:1;flex-shrink:0;}
        .header-division-label{font-family:'Nunito', sans-serif;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);}
        .header-division{font-family:'Nunito', sans-serif;font-weight:900;font-size:21px;letter-spacing:1px;text-transform:uppercase;color:white;line-height:1.2;}
        .header-record{font-family:'Nunito', sans-serif;font-weight:900;font-size:25px;color:var(--secondary);margin-top:4px;}
        .card-footer{background:var(--primary);padding:14px 32px;display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:16px;border-top:2px solid rgba(255,204,0,0.18);}
        .footer-verify{font-family:'Nunito', sans-serif;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);}
        .footer-date{font-family:'Nunito', sans-serif;font-size:13px;color:rgba(255,255,255,0.45);margin-top:2px;}
        .footer-motto{font-family:'Nunito', sans-serif;font-weight:700;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);text-align:right;}
        .footer-website{font-family:'Nunito', sans-serif;font-weight:900;font-size:14px;letter-spacing:0.5px;text-transform:uppercase;color:var(--secondary);opacity:0.65;margin-top:2px;text-align:right;}
        .content-area{padding:28px 32px;}
        .section-title{font-family:'Nunito', sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;text-transform:uppercase;color:var(--primary);border-bottom:2px solid var(--secondary);padding-bottom:6px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
        .section-title span{color:rgba(0,35,75,0.45);font-weight:600;letter-spacing:1px;}



        /* ===== HOME LAYOUT SECTIONS ===== */
        .home-top-zone{display:grid;grid-template-columns:280px 1fr;min-height:200px;background:var(--primary);border-bottom:1px solid rgba(255,204,0,0.12);}
        .home-top-zone.match-day{background:#060e1c;}
        .home-sticky-col{padding:20px 20px 20px 24px;display:flex;flex-direction:column;gap:10px;border-right:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.12);}
        .home-sticky-empty{flex:1;display:flex;align-items:center;justify-content:center;opacity:0.25;font-family:'Nunito',sans-serif;font-size:11px;color:white;text-transform:uppercase;letter-spacing:1px;}
        .sticky-note{background:#fffbeb;border-radius:3px 6px 6px 3px;padding:0;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.35),2px 2px 0 rgba(0,0,0,0.08);position:relative;flex-shrink:0;}
        .sticky-note::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--secondary);}
        .sticky-header{background:#fef3c7;padding:7px 12px 6px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid rgba(202,138,4,0.2);}
        .sticky-from{font-family:'Nunito',sans-serif;font-weight:900;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;color:#78350f;display:flex;align-items:center;gap:5px;}
        .sticky-ts{font-family:'Nunito',sans-serif;font-size:10px;color:rgba(120,53,15,0.5);font-weight:600;}
        .sticky-body{padding:10px 12px 10px;font-family:'Nunito',sans-serif;font-size:13px;color:#1c1917;line-height:1.55;}
        .sticky-footer{padding:6px 12px 10px;display:flex;justify-content:flex-end;}
        .sticky-ack{font-family:'Nunito',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;padding:8px 16px;border-radius:20px;cursor:pointer;border:1px solid rgba(120,53,15,0.25);background:transparent;color:#92400e;transition:all 0.15s;min-height:36px;}
        .sticky-ack:hover{background:#fef3c7;border-color:rgba(120,53,15,0.4);}
        .sticky-ack.acked{background:#dcfce7;border-color:rgba(22,163,74,0.3);color:#15803d;cursor:default;}
        .home-hero-col{position:relative;overflow:hidden;transition:background 0.4s ease;padding:20px 24px;}
        .home-hero-col::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 18px,rgba(255,255,255,0.012) 18px,rgba(255,255,255,0.012) 36px);pointer-events:none;}
        .home-hero-col.match-day::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,204,0,0.08) 0%,transparent 70%);pointer-events:none;}

        /* ===== HOME SECTION DIVIDERS ===== */

        .home-section-label{font-family:'Nunito',sans-serif;font-weight:900;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:10px 20px 0;}

        @media(max-width:860px){
            .home-top-zone{grid-template-columns:240px 1fr;}
        }
        @media(max-width:640px){
            .home-top-zone{grid-template-columns:1fr;grid-template-rows:auto auto;}
            .home-sticky-col{border-right:none;border-bottom:1px solid rgba(255,255,255,0.07);padding:16px 14px;}
            .home-hero-col{padding:0;}
        }
        /* ===== ANNOUNCEMENT PINS ===== */
        .announcement-pin{background:var(--primary);border-left:4px solid var(--secondary);padding:14px 20px;display:flex;align-items:flex-start;gap:14px;}
        .announcement-pin+.announcement-pin{border-top:1px solid rgba(255,255,255,0.06);}
        .ann-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
        .ann-body{flex:1;}
        .ann-from{font-family:'Nunito', sans-serif;font-weight:700;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;color:var(--secondary);margin-bottom:3px;}
        .ann-text{font-family:'Nunito', sans-serif;font-size:14px;color:rgba(255,255,255,0.88);line-height:1.5;}
        .ann-meta{font-family:'Nunito', sans-serif;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.3);margin-top:4px;}
        .ann-ack{font-family:'Nunito', sans-serif;font-weight:700;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;padding:5px 12px;border-radius:2px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.4);transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
        .ann-ack:hover{border-color:rgba(255,204,0,0.4);color:var(--secondary);}
        .ann-ack.acked{background:rgba(22,163,74,0.15);border-color:rgba(22,163,74,0.3);color:#4ade80;cursor:default;}

        /* ===== ACHIEVEMENT OVERLAY ===== */
        .achievement-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInOverlay 0.3s ease;}
        @keyframes fadeInOverlay{from{opacity:0}to{opacity:1}}
        .achievement-card{background:var(--primary);border:3px solid var(--secondary);border-radius:8px;padding:48px 40px;max-width:380px;width:100%;text-align:center;box-shadow:0 0 80px rgba(255,204,0,0.25),0 30px 80px rgba(0,0,0,0.6);animation:scaleIn 0.35s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden;}
        @keyframes scaleIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
        .achievement-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 18px,rgba(255,255,255,0.015) 18px,rgba(255,255,255,0.015) 36px);pointer-events:none;}
        .ach-eyebrow{font-family:'Nunito', sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--secondary);font-weight:700;margin-bottom:16px;}
        .ach-emoji{font-size:64px;display:block;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(255,204,0,0.4));animation:floatBadge 2s ease-in-out infinite;}
        @keyframes floatBadge{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .ach-title{font-family:'Nunito', sans-serif;font-weight:900;font-size:28px;letter-spacing:0.5px;text-transform:uppercase;color:white;line-height:1.1;margin-bottom:8px;}
        .ach-desc{font-family:'Nunito', sans-serif;font-size:14px;color:rgba(255,255,255,0.55);line-height:1.5;margin-bottom:28px;}
        .ach-dismiss{font-family:'Nunito', sans-serif;font-weight:900;font-size:14px;letter-spacing:0.5px;text-transform:uppercase;background:var(--secondary);color:var(--primary);border:none;padding:12px 32px;border-radius:3px;cursor:pointer;width:100%;transition:background 0.15s;}
        .ach-dismiss:hover{background:#ffe033;}

        /* ===== COUNTDOWN ===== */
        .countdown-wrap{position:relative;z-index:1;margin-top:16px;padding-top:18px;}
        .countdown-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,204,0,0.5) 25%,rgba(255,204,0,0.75) 50%,rgba(255,204,0,0.5) 75%,transparent 100%);}
        .countdown-label{font-family:'Nunito', sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);font-weight:700;margin-bottom:8px;}
        .countdown-units{display:flex;gap:16px;align-items:flex-end;}
        .countdown-unit{text-align:center;}
        .countdown-num{font-family:'Nunito', sans-serif;font-weight:900;font-size:38px;color:white;line-height:1;display:block;}
        .countdown-num.match-day-cd{color:var(--secondary);font-size:52px;text-shadow:0 0 40px rgba(255,204,0,0.5);}
        .countdown-sep{font-family:'Nunito', sans-serif;font-weight:900;font-size:28px;color:rgba(255,255,255,0.2);line-height:1;padding-bottom:4px;}
        .countdown-sublabel{font-family:'Nunito', sans-serif;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);font-weight:700;margin-top:3px;display:block;}

        /* ===== MATCH DAY HERO ===== */
        .home-hero.match-day{background:#060e1c;border-bottom-color:rgba(255,204,0,0.4);}
        .home-hero.match-day::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,204,0,0.08) 0%,transparent 70%);pointer-events:none;}

        /* ===== CHECK-IN STREAK ===== */
        .checkin-streak-row{padding:12px 24px;background:rgba(0,35,75,0.03);border-bottom:1px solid rgba(0,35,75,0.07);display:flex;align-items:center;gap:10px;}
        .streak-num{font-family:'Nunito', sans-serif;font-weight:900;font-size:18px;color:#ea580c;}
        .streak-text{font-family:'Nunito', sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,35,75,0.55);}

        /* ===== MOMENTUM METER ===== */
        .momentum-wrap{background:var(--primary);border-radius:4px;padding:18px 20px;margin-bottom:20px;border-left:4px solid var(--secondary);}
        .momentum-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
        .momentum-title{font-family:'Nunito', sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.45);}
        .momentum-label-val{font-family:'Nunito', sans-serif;font-weight:900;font-size:18px;letter-spacing:1px;}
        .momentum-track{height:12px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;}
        .momentum-fill{height:100%;border-radius:6px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1);}
        .momentum-sublabel{font-family:'Nunito', sans-serif;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:8px;}


        /* ===== LAST MATCH CELL ===== */
        .lm-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;}
        .lm-score-row{display:flex;align-items:center;justify-content:center;gap:8px;}
        .lm-score{font-family:'Nunito',sans-serif;font-weight:900;font-size:26px;color:var(--primary);letter-spacing:1px;}
        .lm-badge{font-family:'Nunito',sans-serif;font-weight:900;font-size:11px;padding:3px 9px;border-radius:3px;letter-spacing:1px;}
        .lm-opp{font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:rgba(0,35,75,0.55);text-align:center;line-height:1.4;}
        .lm-date{font-family:'Nunito',sans-serif;font-size:10px;color:rgba(0,35,75,0.35);letter-spacing:0.5px;text-transform:uppercase;}
        .lm-empty{color:rgba(0,35,75,0.3);font-size:12px;font-family:'Nunito',sans-serif;}




        .tourn-map-header{margin-bottom:12px;}
        .map-day-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
        .map-day-btn{font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;padding:7px 14px;border-radius:20px;border:1.5px solid rgba(0,35,75,0.18);background:white;color:rgba(0,35,75,0.5);cursor:pointer;transition:all 0.15s;}
        .map-day-btn:hover{border-color:var(--primary);color:var(--primary);}
        .map-day-btn.active{background:var(--primary);color:var(--secondary);border-color:var(--primary);font-weight:900;}
        /* ===== VENUE MAP ===== */
        .venue-map-section{margin-bottom:24px;}
        .venue-map-outer{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start;}
        .venue-svg{width:100%;display:block;border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
        .map-field-group:hover .mf-rect{filter:brightness(1.25);}
        .vfi{background:white;border-radius:6px;border:1px solid rgba(0,35,75,0.1);padding:14px 16px;min-height:120px;box-shadow:0 2px 10px rgba(0,35,75,0.07);}
        .vfi-empty{background:rgba(0,35,75,0.03);border:1px dashed rgba(0,35,75,0.15);display:flex;align-items:center;justify-content:center;min-height:100px;border-radius:6px;color:rgba(0,35,75,0.35);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;}
        .vfi-field-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--primary);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--secondary);}

        .opp-stats-label{font-family:'Nunito', sans-serif;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.35);font-weight:700;}

        /* ===== STANDINGS ===== */
        .standings-table{width:100%;border-collapse:collapse;font-size:12px;}
        .standings-table thead tr{background:var(--primary);}
        .standings-table thead th{font-family:'Nunito', sans-serif;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:700;padding:11px 10px;text-align:center;}
        .standings-table thead th:nth-child(2){text-align:left;}
        .standings-table tbody tr{border-bottom:1px solid rgba(0,35,75,0.06);}
        .standings-table tbody tr:hover{background:rgba(0,35,75,0.03);}
        .standings-table tbody tr.current-team{background:rgba(255,204,0,0.1);border-left:3px solid var(--secondary);font-weight:700;}
        .standings-table td{padding:10px 10px;text-align:center;font-size:14px;}
        .standings-table td:nth-child(2){text-align:left;}
        .pts-cell{font-family:'Nunito', sans-serif;font-weight:900;font-size:18px;color:var(--primary);}
        .gd-pos{color:#15803d;font-weight:700;}.gd-neg{color:#b91c1c;font-weight:700;}
        .standings-table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}

        /* ===== SCHEDULE + RSVP ===== */
        .schedule-table{width:100%;border-collapse:collapse;}
        .schedule-table thead tr{background:var(--primary);}
        .schedule-table thead th{font-family:'Nunito', sans-serif;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:700;padding:11px 14px;text-align:left;}
        .schedule-table tbody tr{border-bottom:1px solid rgba(0,35,75,0.06);}
        .schedule-table tbody tr.next-up{background:rgba(255,204,0,0.1);font-weight:700;border-left:3px solid var(--secondary);}
        .schedule-table td{padding:10px 14px;font-size:14px;vertical-align:middle;}
        .schedule-date{font-family:'Nunito', sans-serif;font-weight:700;font-size:15px;color:var(--primary);white-space:nowrap;}
        .schedule-time{font-family:'Nunito', sans-serif;font-weight:700;font-size:15px;color:rgba(0,35,75,0.55);text-align:center;white-space:nowrap;}
        .schedule-loc{font-size:13px;color:rgba(0,35,75,0.45);text-align:right;}
        .sched-rsvp-cell{text-align:right;white-space:nowrap;}
        .sched-rsvp-btn{font-family:'Nunito', sans-serif;font-weight:700;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;padding:8px 12px;border-radius:2px;cursor:pointer;transition:all 0.12s;border:1px solid rgba(0,35,75,0.15);background:rgba(0,35,75,0.04);color:rgba(0,35,75,0.5);margin-left:3px;}
        .sched-rsvp-btn:hover{border-color:rgba(0,35,75,0.3);color:rgba(0,35,75,0.8);}
        .sched-rsvp-btn.active-yes{background:#dcfce7;color:#15803d;border-color:#16a34a;}
        .sched-rsvp-btn.active-maybe{background:#fef3c7;color:#92400e;border-color:#ca8a04;}
        .sched-rsvp-btn.active-no{background:#fee2e2;color:#b91c1c;border-color:#dc2626;}

        /* ===== SEASON STORY ===== */
        .story-grid{display:grid;grid-template-columns:3fr 2fr;gap:32px;}
        .story-narrative{font-size:15px;line-height:1.8;color:#1e293b;}
        .story-narrative strong{color:var(--primary);}
        .story-section-title{font-family:'Nunito', sans-serif;font-weight:900;font-size:17px;text-transform:uppercase;letter-spacing:1px;color:var(--primary);border-bottom:2px solid var(--secondary);padding-bottom:6px;margin-bottom:12px;}
        .story-timeline{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;}
        .tl-dot{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'Nunito', sans-serif;font-weight:900;font-size:11px;cursor:default;}
        .tl-dot.W{background:#16a34a;color:white;}
        .tl-dot.L{background:#dc2626;color:white;}
        .tl-dot.D{background:#ca8a04;color:white;}
        .tl-dot.future{background:rgba(0,35,75,0.06);color:rgba(0,35,75,0.4);border:2px dashed rgba(0,35,75,0.3);}
        .story-stat-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:3px;margin-bottom:6px;}
        .story-stat-row.pts{background:white;border-left:4px solid var(--primary);}
        .story-stat-row.avail{background:rgba(255,204,0,0.22);border-left:4px solid var(--secondary);}
        .story-stat-row.max{background:#e8f5ee;border-left:4px solid #16a34a;}
        .story-stat-label{font-family:'Nunito', sans-serif;font-size:13px;letter-spacing:0.5px;text-transform:uppercase;font-weight:700;}
        .story-stat-val{font-family:'Nunito', sans-serif;font-weight:900;font-size:30px;}
        .ai-story-btn:hover{background:#ffe033;}
        .ai-story-btn:disabled{opacity:0.5;cursor:not-allowed;}

        /* ===== TACTICAL ===== */
        .tactic-subnav{background:#001530;border-bottom:1px solid rgba(255,255,255,0.07);padding:8px 12px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
        .tactic-btn{font-family:'Nunito', sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;text-transform:uppercase;padding:10px 14px;border-radius:2px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.45);cursor:pointer;transition:all 0.15s;min-height:40px;}
        .tactic-btn:hover{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.3);}
        .tactic-btn.active{background:var(--secondary);color:var(--primary);border-color:var(--secondary);font-weight:900;}
        /* ===== STORY SUBNAV ===== */
        .stats-subnav{display:flex;background:var(--primary);border-bottom:2px solid rgba(255,255,255,0.06);padding:0 16px;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
        .stats-subnav::-webkit-scrollbar{display:none;}
        .stats-subnav-btn{font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);background:none;border:none;border-bottom:3px solid transparent;padding:12px 18px;cursor:pointer;white-space:nowrap;transition:color 0.15s,border-color 0.15s;margin-bottom:-2px;}
        .stats-subnav-btn:hover{color:rgba(255,255,255,0.7);}
        .stats-subnav-btn.active{color:white;border-bottom-color:var(--secondary);font-weight:900;}

        .tactical-field{background-color:#1a6b35;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,0.04),rgba(255,255,255,0.04) 10%,transparent 10%,transparent 20%);border:3px solid rgba(255,255,255,0.65);border-radius:4px;position:relative;overflow:hidden;}
        .player-dot{position:absolute;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito', sans-serif;font-weight:900;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.4);transition:opacity 0.25s ease;z-index:20;}
        .dimmed{opacity:0.28;transform:translate(-50%,-50%) scale(0.82)!important;filter:grayscale(60%);}
        .highlighted{opacity:1;transform:translate(-50%,-50%) scale(1.08)!important;}
        .tactic-role{font-family:'Nunito', sans-serif;font-weight:900;font-size:19px;color:var(--primary);width:52px;flex-shrink:0;text-align:center;line-height:1;}
        .tactic-role.mid{color:#b45309;}.tactic-role.att{color:#b91c1c;}
        .tactic-heading{font-family:'Nunito', sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;text-transform:uppercase;color:var(--primary);margin-bottom:3px;}
        .tactic-body{font-size:14px;color:#374151;line-height:1.6;}
        .tactic-section-badge{font-family:'Nunito', sans-serif;font-weight:700;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;padding:3px 10px;border-radius:2px;margin-bottom:16px;display:inline-block;}
        .tactic-section-badge.overview,.tactic-section-badge.defense{background:rgba(0,35,75,0.07);color:var(--primary);}
        .tactic-section-badge.midfield{background:rgba(255,204,0,0.18);color:#7c5900;}
        .tactic-section-badge.attack{background:rgba(220,38,38,0.07);color:#b91c1c;}


        /* ===== AI MODAL ===== */
        .ai-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
        .ai-modal{background:white;border-radius:6px;width:100%;max-width:520px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
        .ai-modal-header{background:var(--primary);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--secondary);}
        .ai-modal-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;letter-spacing:0.5px;text-transform:uppercase;color:white;}
        .ai-modal-close{background:none;border:none;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;padding:0;line-height:1;}
        .ai-modal-body{padding:18px;}
        .ai-prompt-label{font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,35,75,0.5);display:block;margin-bottom:6px;}
        .ai-prompt-input{width:100%;border:1px solid rgba(0,35,75,0.15);border-radius:3px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--primary);resize:vertical;min-height:72px;box-sizing:border-box;}
        .ai-result-box{background:rgba(0,35,75,0.03);border:1px solid rgba(0,35,75,0.1);border-radius:3px;padding:12px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--primary);line-height:1.6;margin-top:12px;white-space:pre-wrap;}
        .ai-modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
        .ai-cancel-btn{font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;background:none;border:1px solid rgba(0,35,75,0.15);color:rgba(0,35,75,0.5);padding:8px 14px;border-radius:3px;cursor:pointer;}
        .ai-gen-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;text-transform:uppercase;background:var(--primary);color:white;border:none;padding:8px 16px;border-radius:3px;cursor:pointer;}
        .ai-use-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;text-transform:uppercase;background:var(--secondary);color:var(--primary);border:none;padding:8px 16px;border-radius:3px;cursor:pointer;}
        .ai-spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .apikey-modal{background:white;border-radius:6px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
        .apikey-modal-header{background:var(--primary);padding:14px 18px;border-bottom:3px solid var(--secondary);}
        .apikey-modal-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;letter-spacing:0.5px;text-transform:uppercase;color:white;}
        .apikey-modal-sub{font-family:'Nunito',sans-serif;font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;}
        .apikey-modal-body{padding:18px;}
        .apikey-input{width:100%;border:1px solid rgba(0,35,75,0.15);border-radius:3px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--primary);box-sizing:border-box;margin-bottom:8px;}
        .apikey-hint{font-family:'Nunito',sans-serif;font-size:11px;color:rgba(0,35,75,0.4);line-height:1.5;margin-bottom:12px;}
        .apikey-submit{font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;text-transform:uppercase;background:var(--primary);color:white;border:none;padding:10px 18px;border-radius:3px;cursor:pointer;width:100%;}

        /* ===== BOTTOM NAV (mobile only) ===== */
        .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--primary);border-top:3px solid var(--secondary);z-index:200;padding:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}

        .bottom-nav-inner{display:flex;width:100%;justify-content:center;}
        .bnav-btn{font-family:'Nunito', sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;padding:8px 14px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:3px solid transparent;min-width:58px;transition:color 0.15s;}

    /* ============================================================

    const MONTH_MAP = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    function parseMatchDateTime(dateStr, timeStr) {
        const dp = dateStr.trim().split(' ');
        const month = MONTH_MAP[dp[dp.length - 2]];
        const day = parseInt(dp[dp.length - 1]);
        const tp = timeStr.trim().split(' ');
        const ampm = tp[1];
        const [hStr, mStr] = tp[0].split(':');
        let hour = parseInt(hStr), min = parseInt(mStr);
        if (ampm === 'PM' && hour !== 12) hour += 12;
        if (ampm === 'AM' && hour === 12) hour = 0;
        const now = new Date();
        let year = now.getFullYear();
        if (month < now.getMonth()) year++;
        return new Date(year, month, day, hour, min, 0);
    }
    function getMillisUntilMatch() {
        const sched = TEAM_CONFIG.remainingSchedule[0];
        if (!sched) return null;
        const t = parseMatchDateTime(sched.date, sched.time) - Date.now();
        return t > 0 ? t : null;
    }
    function isMatchDay() {
        const ms = getMillisUntilMatch();
        return ms !== null && ms < 24 * 60 * 60 * 1000;
    }
    function startCountdown(isMatchDayMode) {
        if (countdownInterval) clearInterval(countdownInterval);
        function tick() {
            const ms = getMillisUntilMatch();
            if (!ms) return;
            const totalSec = Math.floor(ms / 1000);
            const d = Math.floor(totalSec / 86400);
            const h = Math.floor((totalSec % 86400) / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            const wrap = document.getElementById('countdownUnits');
            if (!wrap) { clearInterval(countdownInterval); return; }
            const cls = isMatchDayMode ? ' match-day-cd' : '';
            if (isMatchDayMode) {
                wrap.innerHTML = `
                    <div class="countdown-unit"><span class="countdown-num${cls}">${String(h).padStart(2,'0')}</span><span class="countdown-sublabel">Hours</span></div>
                    <div class="countdown-sep">:</div>
                    <div class="countdown-unit"><span class="countdown-num${cls}">${String(m).padStart(2,'0')}</span><span class="countdown-sublabel">Min</span></div>
                    <div class="countdown-sep">:</div>
                    <div class="countdown-unit"><span class="countdown-num${cls}">${String(s).padStart(2,'0')}</span><span class="countdown-sublabel">Sec</span></div>`;
            } else {
                wrap.innerHTML = `
                    ${d > 0 ? `<div class="countdown-unit"><span class="countdown-num">${d}</span><span class="countdown-sublabel">${d===1?'Day':'Days'}</span></div><div class="countdown-sep">:</div>` : ''}
                    <div class="countdown-unit"><span class="countdown-num">${String(h).padStart(2,'0')}</span><span class="countdown-sublabel">Hrs</span></div>
                    <div class="countdown-sep">:</div>
                    <div class="countdown-unit"><span class="countdown-num">${String(m).padStart(2,'0')}</span><span class="countdown-sublabel">Min</span></div>
                    <div class="countdown-sep">:</div>
                    <div class="countdown-unit"><span class="countdown-num">${String(s).padStart(2,'0')}</span><span class="countdown-sublabel">Sec</span></div>`;
            }
        }
        tick();
        countdownInterval = setInterval(tick, 1000);
    }

    /* ============================================================
       MOMENTUM
    ============================================================ */
    function computeMomentum(matches) {
        const last5 = matches.slice(-5);
        const score = last5.reduce((sum, m) => sum + (m.res === 'W' ? 3 : m.res === 'D' ? 1 : 0), 0);
        const max = last5.length * 3;
        const pct = max > 0 ? Math.round((score / max) * 100) : 0;
        let label, color, sublabel;
        if (pct >= 87)      { label = 'ON FIRE \uD83D\uDD25';   color = '#f97316'; sublabel = 'Dominant last 5 matches'; }
        else if (pct >= 60) { label = 'BUILDING \u2191';        color = '#16a34a'; sublabel = 'Strong recent form'; }
        else if (pct >= 33) { label = 'STEADY';                 color = '#ca8a04'; sublabel = 'Mixed results lately'; }
        else                { label = 'NEEDS A SPARK';          color = '#dc2626'; sublabel = 'Tough run of results'; }
        return { pct, score, max, label, color, sublabel };
    }

    /* ============================================================
       HELPERS
    ============================================================ */
    function getFormGuide(matches, n) {
        return matches.slice(-n).map(m => m.res);
    }

    function getStreak(matches) {
        if (!matches.length) return { type: null, count: 0 };
        const last = matches[matches.length - 1].res;
        let count = 0;
        for (let i = matches.length - 1; i >= 0; i--) {
            if (matches[i].res === last) count++;
            else break;
        }
        return { type: last, count };
    }

    function computeBadges(team) {
        const badges = [];
        const r = team.record;
        const l = team.league;
        const streak = getStreak(team.matches);
        const total = r.wins + r.losses + r.draws;
        const gpg = total > 0 ? team.goals.for / total : 0;
        const gapg = total > 0 ? team.goals.against / total : 0;

        if (streak.type === 'W' && streak.count >= 3)
            badges.push({ icon: '🔥', label: streak.count + '-Match Win Streak', cls: 'hot', desc: streak.count + ' wins in a row — the team is on fire right now.' });
        else if (streak.type === 'W' && streak.count === 2)
            badges.push({ icon: '⚡', label: '2 Straight Wins', cls: 'gold', desc: 'Back-to-back wins — momentum is building.' });

        const unbeatenStreak = (() => {
            let c = 0;
            for (let i = team.matches.length - 1; i >= 0; i--) {
                if (team.matches[i].res !== 'L') c++; else break;
            }
            return c;
        })();
        if (streak.type !== 'W' && unbeatenStreak >= 3)
            badges.push({ icon: '🛡️', label: unbeatenStreak + '-Match Unbeaten', cls: 'blue', desc: unbeatenStreak + ' matches without a loss — solid defensive resilience.' });

        if (gapg < 1.5 && total >= 5)
            badges.push({ icon: '🧱', label: 'Iron Wall', cls: 'blue', desc: 'Conceding less than 1.5 goals per game — this defense is locked in.' });

        if (gpg > 2.0 && total >= 5)
            badges.push({ icon: '🎯', label: 'Goal Machine', cls: 'green', desc: 'Scoring over 2 goals per game — clinical and lethal up front.' });

        if (l.rank <= Math.ceil(l.totalTeams / 2))
            badges.push({ icon: '📈', label: 'Top Half', cls: 'green', desc: 'Ranked in the top half of a ' + l.totalTeams + '-team division.' });

        const recentForm = getFormGuide(team.matches, 5);
        const recentWins = recentForm.filter(x => x === 'W').length;
        if (recentWins >= 3 && streak.count < 3)
            badges.push({ icon: '🚀', label: recentWins + '/5 Recent Form', cls: 'gold', desc: recentWins + ' wins in the last 5 — finding top gear at the right time.' });

        if (!badges.length)
            badges.push({ icon: '💪', label: 'In The Fight', cls: 'gray', desc: 'Giving everything every match. The turnaround is coming.' });

        return badges;
    }

    /* ============================================================

    function generateAutoNarrative(team) {
        const r = team.record;
        const l = team.league;
        const nm = team.nextMatch;
        const streak = getStreak(team.matches);
        const form = getFormGuide(team.matches, 5);
        const recentWins = form.filter(x => x === 'W').length;
        const total = r.wins + r.losses + r.draws;
        const gpg = total > 0 ? (team.goals.for / total).toFixed(1) : 0;
        const gapg = total > 0 ? (team.goals.against / total).toFixed(1) : 0;
        const avail = team.remainingSchedule.length * 3;
        const maxPts = l.points + avail;

        let opener = '';
        if (streak.type === 'W' && streak.count >= 3) {
            opener = `On the back of a ${streak.count}-match win streak, ${team.branding.name} is building serious momentum as the season enters its final stretch.`;
        } else if (streak.type === 'W' && streak.count === 2) {
            opener = `Back-to-back wins have ${team.branding.name} finding their rhythm at exactly the right moment in the season.`;
        } else if (streak.type === 'L' && streak.count >= 2) {
            opener = `Knocked down but not out — ${team.branding.name} absorbs a ${streak.count}-game skid and now faces a defining moment. The response to adversity separates teams. How they answer here will define this season.`;
        } else if (recentWins >= 3) {
            opener = `${team.branding.name} is finding their groove at the right time — ${recentWins} wins in the last 5 matches with the finish line in sight.`;
        } else {
            opener = `${r.wins} wins, ${r.losses} losses, ${r.draws} draw — ${team.branding.name} knows exactly what's at stake as the final games approach.`;
        }

        const rankContext = l.rank <= Math.ceil(l.totalTeams / 2)
            ? `Holding down the #${l.rank} spot — comfortably in the top half of a ${l.totalTeams}-team division —`
            : `Sitting at #${l.rank} of ${l.totalTeams} with games left to play and plenty of room to climb,`;

        const diffContext = parseInt(l.goalDiff) > 0
            ? `A positive ${l.goalDiff} goal differential (${team.goals.for} scored, ${team.goals.against} conceded) shows this team competes hard on both ends of the pitch.`
            : parseInt(l.goalDiff) < 0
            ? `The ${l.goalDiff} goal differential signals an area to tighten up — limiting chances against will be key in the final run.`
            : `An even goal differential (${team.goals.for} for, ${team.goals.against} against) reflects a closely fought season where every goal matters.`;

        const nextContext = l.rank < nm.oppRank
            ? `Next up: a favorable matchup against #${nm.oppRank} ${nm.oppName} — a chance to pile on points and push up the table.`
            : l.rank > nm.oppRank
            ? `Next up is #${nm.oppRank} ${nm.oppName} — a true measuring stick. A result here would silence the doubters and signal that this group is ready to fight back.`
            : `A leveled matchup against #${nm.oppRank} ${nm.oppName} awaits — three points from this one could be the catalyst for a strong finish.`;

        return `${opener}\n\n${rankContext} the team has accumulated ${l.points} points across ${total} matches. ${diffContext}\n\n${nextContext} With ${team.remainingSchedule.length} games remaining and ${avail} points still available, a maximum tally of ${maxPts} is mathematically on the table. The final push starts now.`;
    }

    /* ============================================================
       TACTICS ANIMATION — curved bezier paths, staggered groups,
       arrow draw-in after players arrive

    let tacticAnimFrame = null;

    // ── Math ─────────────────────────────────────────────────────────────────
    function easeInOutTactic(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
    function quadBez(p0, cp, p1, t) {
        const it = 1 - t;
        return [
            it*it*p0[0] + 2*it*t*cp[0] + t*t*p1[0],
            it*it*p0[1] + 2*it*t*cp[1] + t*t*p1[1]
        ];
    }
    function defaultCP(from, to) {
        // Gentle arc when no explicit control point defined
        const mx = (from[0]+to[0])/2, my = (from[1]+to[1])/2;
        const dx = to[0]-from[0],     dy = to[1]-from[1];
        const d  = Math.sqrt(dx*dx+dy*dy) || 1;
        const curve = d * 0.22;
        return [mx - dy*(curve/d), my + dx*(curve/d)];
    }

    // ── Control points per destination view ──────────────────────────────────
    // Each key matches an arrow path in getTacticalOverlays — so players
    // travel the same curve the arrow traces.
    const TACTIC_CPS = {
        defense: {
            2: [92,68],   // RB  — sideline run (mirrors M 88 80 Q 88 60 88 35)
            3: [8, 68],   // LB  — sideline run (mirrors M 12 80 Q 12 60 12 35)
            4: [74,83],   // RCB — spreads right (mirrors M 69 85 L 82 85)
            5: [26,83],   // LCB — spreads left  (mirrors M 31 85 L 18 85)
            6: [50,70],   // CDM — drops back
            9: [50,30],   // ST  — drops to shape
        },
        midfield: {
            8:  [20,44],  // CM8  — into left half-space (mirrors M 25 48 Q 30 35 38 22)
            10: [80,44],  // CM10 — into right half-space (mirrors M 75 48 Q 70 35 62 22)
            6:  [50,66],  // CDM  — anchors
            2:  [88,65],  // RB   — tucks in
            3:  [12,65],  // LB   — tucks in
        },
        attack: {
            2:  [93,52],  // RB  — long overlap up right  (mirrors M 88 28 Q 80 15 65 12)
            3:  [7, 52],  // LB  — long overlap up left   (mirrors M 12 28 Q 20 15 35 12)
            7:  [83,20],  // RW  — cuts inside from right
            11: [17,20],  // LW  — cuts inside from left
            9:  [50,15],  // ST  — straight forward run   (mirrors M 50 28 Q 50 15 50 8)
            8:  [28,36],  // CM8 — forward run
            10: [72,36],  // CM10— forward run
            4:  [70,67],  // RCB — high line push
            5:  [30,67],  // LCB — high line push
            6:  [50,55],  // CDM — pushes slightly
        },
        overview: {
            2:  [88,68],  // RB  — settles back
            3:  [12,68],  // LB  — settles back
            7:  [87,30],  // RW  — shifts wide
            11: [13,30],  // LW  — shifts wide
            4:  [62,78],  // RCB — resets
            5:  [38,78],  // LCB — resets
            9:  [50,25],  // ST  — drops to shape
        },
    };

    // ── Stagger groups: who moves first → last in each view ──────────────────
    // Structure tells the visual story: base sets first, then the key movements
    const TACTIC_STAGGER = {
        defense:  [[1,4,5],    [6,2,3],      [8,10],     [7,9,11] ],
        midfield: [[1,4,5],    [6],          [2,3,8,10], [7,9,11] ],
        attack:   [[1,4,5,6],  [2,3],        [8,10],     [7,9,11] ],
        overview: [[1],        [4,5,6],      [2,3,8,10], [7,9,11] ],
    };

    const TACTIC_DUR  = 500;  // ms per player movement
    const TACTIC_LAG  = 160;  // ms stagger between groups

    // ── Arrow draw-in after players arrive ───────────────────────────────────
    function drawInArrows(overlayEl) {
        overlayEl.querySelectorAll('path').forEach((el, i) => {
            try {
                const len = el.getTotalLength();
                el.style.strokeDasharray  = len + ' ' + len;
                el.style.strokeDashoffset = String(len);
                el.style.transition = 'stroke-dashoffset 0.45s ease ' + (i * 0.13) + 's';
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    el.style.strokeDashoffset = '0';
                }));
            } catch(e) {}
        });
        overlayEl.querySelectorAll('polygon').forEach((el, i) => {
            el.style.opacity = '0';
            el.style.transition = 'opacity 0.4s ease ' + (i * 0.1) + 's';
            requestAnimationFrame(() => requestAnimationFrame(() => { el.style.opacity = '1'; }));
        });
    }

    // ── Main animation entry point ────────────────────────────────────────────



    function switchTacticView(toView) {
        if (!document.getElementById('tactic-board')) {
            currentTacticView = toView;
            renderTactics(document.getElementById('main-content'));
            return;
        }
        // Cancel any running animation — snap remaining dots in place
        if (tacticAnimFrame) { cancelAnimationFrame(tacticAnimFrame); tacticAnimFrame = null; }

        // Update nav buttons immediately
        ['overview','defense','midfield','attack'].forEach(v => {
            const b = document.getElementById('tbtn-'+v);
            if (b) b.className = 'tactic-btn'+(v===toView?' active':'');
        });

        // Capture current DOM positions (handles mid-animation interrupts cleanly)
        const fromPos = {};
        PLAYER_CONFIG.forEach(p => {
            const el = document.getElementById('pd-'+p.id);
            fromPos[p.id] = el
                ? [parseFloat(el.style.left)||0, parseFloat(el.style.top)||0]
                : (p[currentTacticView]||p.base).slice();
        });

        // Fade arrows out
        const overlayEl = document.getElementById('tactic-svg-overlays');
        if (overlayEl) { overlayEl.style.transition='opacity 0.12s ease'; overlayEl.style.opacity='0'; }

        // Build per-player animation list
        const cps    = TACTIC_CPS[toView] || {};
        const groups = TACTIC_STAGGER[toView] || [PLAYER_CONFIG.map(p=>p.id)];
        const anims  = [];
        let totalTime = 0;

        groups.forEach((group, gi) => {
            const delay = gi * TACTIC_LAG;
            group.forEach(id => {
                const p = PLAYER_CONFIG.find(x=>x.id===id); if (!p) return;
                const from = fromPos[id];
                const to   = (p[toView]||p.base).slice();
                const cp   = cps[id] ? cps[id] : defaultCP(from, to);
                anims.push({ id, from, to, cp, delay });
                totalTime = Math.max(totalTime, delay + TACTIC_DUR);
            });
        });

        currentTacticView = toView; // commit state before async frame
        const startTime = performance.now();

        function frame(now) {
            const elapsed = now - startTime;
            let needMore = false;

            anims.forEach(({ id, from, to, cp, delay }) => {
                const el = document.getElementById('pd-'+id); if (!el) return;
                const raw = (elapsed - delay) / TACTIC_DUR;
                if (raw <= 0) { needMore = true; return; }
                if (raw >= 1) { el.style.left=to[0]+'%'; el.style.top=to[1]+'%'; return; }
                needMore = true;
                const [x,y] = quadBez(from, cp, to, easeInOutTactic(raw));
                el.style.left = x+'%'; el.style.top = y+'%';
            });

            // Swap highlight classes at the midpoint of the overall animation
            if (elapsed >= totalTime * 0.45) {
                PLAYER_CONFIG.forEach(p => {
                    const el = document.getElementById('pd-'+p.id);
                    if (el) el.className = 'player-dot '+getPHL(p, toView);
                });
            }

            if (needMore) {
                tacticAnimFrame = requestAnimationFrame(frame);
            } else {
                // Snap all to exact final positions
                anims.forEach(({ id, to }) => {
                    const el = document.getElementById('pd-'+id);
                    if (el) { el.style.left=to[0]+'%'; el.style.top=to[1]+'%'; }
                });
                // Draw in arrows
                if (overlayEl) {
                    overlayEl.innerHTML = getTacticalOverlays(toView);
                    overlayEl.style.opacity = '1';
                    drawInArrows(overlayEl);
                }
                // Fade in description
                const descEl = document.getElementById('tactic-desc');
                if (descEl) {
                    descEl.style.opacity='0';
                    descEl.style.transition='opacity 0.3s ease';
                    descEl.innerHTML = getTacticDesc(toView);
                    requestAnimationFrame(()=>requestAnimationFrame(()=>{ descEl.style.opacity='1'; }));
                }
                tacticAnimFrame = null;
            }
        }

        tacticAnimFrame = requestAnimationFrame(frame);
    }

    /* ============================================================
       AI UTILITY  — proxied through Cloudflare Worker
       Worker URL: update WORKER_URL below after deploying worker.js
    ============================================================ */
    const WORKER_URL = 'https://sting-hub-ai.lazycryptotrapstar.workers.dev/ai';

    async function callAI(systemPrompt, userPrompt) {
        const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ system: systemPrompt, prompt: userPrompt }),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || 'AI request failed');
        return data.text;
    }

    function showAiModal({ title, promptLabel, placeholder, system, buildPrompt, onUse }) {
        const overlay = document.createElement('div');
        overlay.className = 'ai-modal-overlay';
        overlay.innerHTML = `<div class="ai-modal">
            <div class="ai-modal-header">
                <div class="ai-modal-title">${title}</div>
                <button class="ai-modal-close" onclick="this.closest('.ai-modal-overlay').remove()">✕</button>
            </div>
            <div class="ai-modal-body">
                <label class="ai-prompt-label">${promptLabel}</label>
                <textarea class="ai-prompt-input" id="aiPromptInput" placeholder="${placeholder}"></textarea>
                <div id="aiResultBox" class="ai-result-box" style="display:none;"></div>
                <div class="ai-modal-actions">
                    <button class="ai-cancel-btn" onclick="this.closest('.ai-modal-overlay').remove()">Cancel</button>
                    <button class="ai-gen-btn" id="aiGenBtn">Generate with AI</button>
                    <button class="ai-use-btn" id="aiUseBtn" style="display:none;">Use This</button>
                </div>
            </div>
        </div>`;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        overlay._system = system; overlay._buildPrompt = buildPrompt; overlay._onUse = onUse;

        overlay.querySelector('#aiGenBtn').onclick = async function() {
            const userInput = document.getElementById('aiPromptInput').value.trim(); if (!userInput) return;
            this.disabled = true; this.innerHTML = '<span class="ai-spinner"></span> Generating...';
            const resultBox = document.getElementById('aiResultBox'); resultBox.style.display = 'none';
            try {
                const result = await callAI(overlay._system, overlay._buildPrompt(userInput));
                resultBox.textContent = result; resultBox.style.display = 'block';
                document.getElementById('aiUseBtn').style.display = 'inline-block';
            } catch(err) { resultBox.textContent = 'Error: ' + err.message; resultBox.style.display = 'block'; }
            this.disabled = false; this.textContent = 'Regenerate';
        };
        overlay.querySelector('#aiUseBtn').onclick = function() {
            const text = document.getElementById('aiResultBox').textContent;
            overlay._onUse(text); overlay.remove();
        };
    }

    /* ============================================================
       TOURNAMENT TAB
    ============================================================ */
    function renderTournament(container) {
        const td = TEAM_CONFIG.tournaments;
        if (!td) {
            container.innerHTML = headerHTML('Tournament', 'TOURN') + '<div class="content-area"><p style="color:rgba(0,35,75,0.4);font-family:Nunito,sans-serif;">No tournament data available.</p></div>' + footerHTML('Tournament History');
            return;
        }
        if (tournView === 'map')     { renderTournMap(container, td); return; }
        renderTournBracket(container, td);
    }

    function tournSubnav() {
        return `<div class="stats-subnav">
            <button class="stats-subnav-btn ${tournView==='bracket'||tournView===''?'active':''}" onclick="switchTournView('bracket')">🏆 Bracket</button>
            <button class="stats-subnav-btn ${tournView==='map'?'active':''}" onclick="switchTournView('map')">🗺\uFE0F Venue Map</button>
        </div>`;
    }

    function switchTournView(v) { tournView = v; renderTournament(document.getElementById('main-content')); }

    function renderTournBracket(container, td) {
        const hist = td.history || [];
        let tW=0,tL=0,tD=0;
        hist.forEach(t => { const p=(t.record||'').split('-'); tW+=parseInt(p[0])||0; tL+=parseInt(p[1])||0; tD+=parseInt(p[2])||0; });
        const histHTML = hist.length === 0
            ? '<div style="font-family:Nunito,sans-serif;font-size:13px;color:rgba(0,35,75,0.35);padding:16px;text-align:center;">No tournament history recorded yet.</div>'
            : hist.map(t => {
                const bc = t.result.includes('Champion')||t.result.includes('\uD83C\uDFC6') ? 'champ' : t.result.includes('Runner')||t.result.includes('\uD83E\uDD48') ? 'runner' : 'other';
                return `<div class="tourn-hist-row"><div class="tourn-hist-left"><div class="tourn-hist-name">${t.name}</div><div class="tourn-hist-meta">${t.date}${t.notes?' · '+t.notes:''}</div></div><div class="tourn-hist-right"><span class="tourn-badge ${bc}">${t.result}</span><span class="tourn-hist-rec">${t.record}</span></div></div>`;
            }).join('');

        let currentHTML = '';
        const ct = td.current;
        if (ct) {
            const grp = ct.group;
            const matchRows = (grp.matches||[]).map(m => {
                const isOurs = m.home===grp.ourTeam||m.away===grp.ourTeam;
                const sc = m.score ? `<span class="tourn-score">${m.score}</span>` : `<span class="tourn-tbd">TBD</span>`;
                return `<tr class="${isOurs?'tourn-our-match':''}"><td class="tourn-match-time">${m.date}<br><span>${m.time}</span></td><td class="tourn-match-teams"><span class="${m.home===grp.ourTeam?'tourn-us':''}">${m.home}</span><span class="tourn-vs">vs</span><span class="${m.away===grp.ourTeam?'tourn-us':''}">${m.away}</span></td><td class="tourn-match-score">${sc}</td><td class="tourn-match-field">${m.field}</td></tr>`;
            }).join('');

            const br = ct.bracket;
            const bracketHTML = br ? `<div class="tourn-bracket">
                <div class="tourn-bracket-col">
                    <div class="tourn-bracket-label">Semifinals / Consolation</div>
                    ${br.semis.map(s=>`<div class="tourn-match-card${s.slot==='Consolation'?' consolation':''}"><div class="tourn-match-card-slot">${s.slot}</div><div class="tourn-match-card-time">${s.time}</div>${s.field?`<div class="tourn-match-card-field">${s.field}</div>`:''}<div class="tourn-matchup"><div class="tourn-team-slot">${s.teamA}</div><div class="tourn-team-divider">vs</div><div class="tourn-team-slot">${s.teamB}</div></div>${s.score?`<div class="tourn-match-card-result">${s.score}</div>`:''}</div>`).join('')}
                </div>
                <div class="tourn-bracket-connector"><svg viewBox="0 0 60 120" preserveAspectRatio="none"><path d="M0,30 H30 V90 H0" fill="none" stroke="rgba(255,204,0,0.4)" stroke-width="2"/><path d="M30,60 H60" fill="none" stroke="rgba(255,204,0,0.4)" stroke-width="2"/></svg></div>
                <div class="tourn-bracket-col">
                    <div class="tourn-bracket-label">Final</div>
                    <div class="tourn-match-card final"><div class="tourn-match-card-slot">${br.final.slot}</div><div class="tourn-match-card-time">${br.final.time}</div>${br.final.field?`<div class="tourn-match-card-field">${br.final.field}</div>`:''}<div class="tourn-matchup"><div class="tourn-team-slot">${br.final.teamA}</div><div class="tourn-team-divider">vs</div><div class="tourn-team-slot">${br.final.teamB}</div></div>${br.final.score?`<div class="tourn-match-card-result">${br.final.score}</div>`:''}</div>
                </div>
            </div>` : '';

            currentHTML = `<div class="tourn-section"><div class="tourn-section-header"><div><div class="tourn-section-title">${ct.name}</div><div class="tourn-section-meta">${ct.dates} &nbsp;·&nbsp; ${ct.location}</div></div><span class="tourn-format-badge">${ct.format}</span></div><div class="tourn-sub-label">&#128205; ${grp.name} — Group Stage</div><div class="tourn-table-wrap"><table class="tourn-match-table"><thead><tr><th>Date / Time</th><th>Match</th><th style="text-align:center;">Score</th><th style="text-align:right;">Field</th></tr></thead><tbody>${matchRows}</tbody></table></div><div class="tourn-sub-label" style="margin-top:24px;">&#127942; Knockout Bracket</div>${bracketHTML}</div>`;
        }

        container.innerHTML = `${headerHTML('Tournament','TOURN')}${tournSubnav()}<div class="content-area"><div class="tourn-overall-strip" style="${hist.length===0?'display:none;':''}"><div class="tourn-overall-item"><div class="tourn-overall-num">${hist.length}</div><div class="tourn-overall-lbl">Tournaments</div></div><div class="tourn-overall-item"><div class="tourn-overall-num gold">${tW}</div><div class="tourn-overall-lbl">Tournament W</div></div><div class="tourn-overall-item"><div class="tourn-overall-num">${tL}</div><div class="tourn-overall-lbl">Tournament L</div></div><div class="tourn-overall-item"><div class="tourn-overall-num">${tD}</div><div class="tourn-overall-lbl">Draws</div></div><div class="tourn-overall-item"><div class="tourn-overall-num gold">${hist.filter(t=>t.result.includes('\uD83C\uDFC6')||t.result.includes('Champion')).length}</div><div class="tourn-overall-lbl">Titles</div></div></div>${currentHTML}<div class="tourn-sub-label" style="margin-top:24px;">&#128203; Tournament History</div><div class="tourn-hist-list">${histHTML}</div></div>${footerHTML('Tournament Record')}`;
    }

    function renderTournMap(container, td) {
        const ct = td ? td.current : null;
        const allGames = [];
        (ct && ct.group && ct.group.matches || []).forEach(function(m) {
            allGames.push({ day:m.date, isOurs:m.home===ct.group.ourTeam||m.away===ct.group.ourTeam, field:m.field, date:m.date, time:m.time, home:m.home, away:m.away, score:m.score, label:(m.home===ct.group.ourTeam||m.away===ct.group.ourTeam)?'Our Match \u00b7 Group Stage':'Group Stage' });
        });
        const brItems = [...((ct && ct.bracket && ct.bracket.semis)||[])];
        if (ct && ct.bracket && ct.bracket.final) brItems.push(ct.bracket.final);
        brItems.forEach(function(s) {
            const parts = (s.time||'').split(' \u00b7 ');
            allGames.push({ day:parts[0], isOurs:false, field:s.field, date:parts[0], time:parts[1]||s.time, home:s.teamA, away:s.teamB, score:s.score, label:s.slot });
        });

        const seen = {}; const days = ['All'];
        allGames.forEach(function(g){ if(g.day && !seen[g.day]){ seen[g.day]=1; days.push(g.day); } });

        const activeDay = tournMapDay || 'All';
        mapFieldGames = {};
        const filtered = activeDay === 'All' ? allGames : allGames.filter(function(g){ return g.day === activeDay; });
        filtered.forEach(function(g) {
            const m = (g.field||'').match(/Carpenter Park\s*-?\s*([A-M])\b/i);
            if (!m) return;
            const letter = m[1].toUpperCase();
            if (!mapFieldGames[letter]) mapFieldGames[letter] = [];
            mapFieldGames[letter].push(g);
        });

        const dayBtns = days.map(function(d){ return '<button class="map-day-btn'+(d===activeDay?' active':'')+'" onclick="setMapDay(\''+d+'\')">'+d+'</button>'; }).join('');

        container.innerHTML = `${headerHTML('Tournament','TOURN')}${tournSubnav()}<div class="content-area">${ct?`<div class="tourn-map-header"><div class="tourn-section-title" style="color:var(--primary);font-size:15px;">${ct.name}</div><div style="font-family:Nunito,sans-serif;font-size:12px;color:rgba(0,35,75,0.45);margin-bottom:10px;">${ct.location}</div></div>`:''}<div class="map-day-bar">${dayBtns}</div><div class="venue-map-outer">${buildVenueMapSVG()}<div id="mapFieldInfo" class="vfi vfi-empty"><span>Tap any field to see${activeDay==='All'?' all':' '+activeDay} games</span></div></div></div>${footerHTML('Venue Map')}`;
    }

    function setMapDay(day) { tournMapDay = day; renderTournament(document.getElementById('main-content')); }

    function buildVenueMapSVG() {
        function state(id) {
            const g = mapFieldGames[id]||[];
            if (!g.length) return 'inactive';
            if (g.some(function(x){return x.isOurs;})) return 'ours';
            if (g.some(function(x){return x.label==='Final';})) return 'final';
            if (g.some(function(x){return x.label&&x.label.indexOf('Semi')>=0;})) return 'semi';
            return 'active';
        }
        const C = {
            ours:    {fill:'#00234b',stroke:'#ffcc00',sw:2.5,text:'#ffcc00',ltext:'rgba(255,204,0,0.7)'},
            final:   {fill:'#7c3f00',stroke:'#ffcc00',sw:2.5,text:'#ffcc00',ltext:'rgba(255,204,0,0.6)'},
            semi:    {fill:'#1a3a6b',stroke:'#93c5fd',sw:1.8,text:'#bfdbfe',ltext:'rgba(191,219,254,0.7)'},
            active:  {fill:'#1a5c30',stroke:'rgba(255,255,255,0.45)',sw:1.2,text:'rgba(255,255,255,0.85)',ltext:'rgba(255,255,255,0.45)'},
            inactive:{fill:'#1a3d24',stroke:'rgba(255,255,255,0.15)',sw:0.8,text:'rgba(255,255,255,0.35)',ltext:'rgba(255,255,255,0.2)'},
        };
        const fields = [
            {id:'E',x:25, y:58, w:58,h:44, label:'E',size:'9v9'},
            {id:'F',x:148,y:18, w:58,h:44, label:'F',size:'9v9'},
            {id:'G',x:216,y:18, w:58,h:44, label:'G',size:'9v9'},
            {id:'H',x:298,y:22, w:64,h:48, label:'H',size:'9v9'},
            {id:'A',x:140,y:83, w:88,h:112,label:'A',size:'11v11'},
            {id:'B',x:238,y:83, w:88,h:112,label:'B',size:'11v11'},
            {id:'D',x:140,y:205,w:88,h:112,label:'D',size:'11v11'},
            {id:'C',x:238,y:205,w:88,h:112,label:'C',size:'11v11'},
            {id:'L',x:330,y:258,w:72,h:100,label:'L',size:'11v11'},
            {id:'M',x:410,y:258,w:72,h:100,label:'M',size:'11v11'},
        ];
        const svgFields = fields.map(function(f) {
            const s=state(f.id),c=C[s],cx=f.x+f.w/2,cy=f.y+f.h/2,big=f.size==='11v11';
            const mk=big?`<line x1="${f.x+3}" y1="${cy}" x2="${f.x+f.w-3}" y2="${cy}" stroke="rgba(255,255,255,0.15)" stroke-width="0.7"/><rect x="${cx-11}" y="${f.y+4}" width="22" height="15" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/><rect x="${cx-11}" y="${f.y+f.h-19}" width="22" height="15" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/><circle cx="${cx}" cy="${cy}" r="6" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>`:
                `<line x1="${f.x+3}" y1="${cy}" x2="${f.x+f.w-3}" y2="${cy}" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>`;
            const badge=s==='ours'?'⭐':s==='final'?'🏆':'';
            const badgeEl=badge?`<text x="${cx}" y="${f.y+(big?12:10)}" font-family="Nunito" font-size="${big?9:7}" text-anchor="middle" fill="${c.text}">${badge}</text>`:'';
            return `<g onclick="showMapField('${f.id}')" style="cursor:pointer;" class="map-field-group"><rect id="mf-${f.id}" class="mf-rect" x="${f.x}" y="${f.y}" width="${f.w}" height="${f.h}" rx="3" fill="${c.fill}" stroke="${c.stroke}" stroke-width="${c.sw}" style="transition:filter 0.2s;"/>${mk}${badgeEl}<text x="${cx}" y="${cy+(badge?3:1)}" font-family="Nunito" font-size="${big?20:14}" font-weight="900" fill="${c.text}" text-anchor="middle" dominant-baseline="middle">${f.label}</text><text x="${cx}" y="${cy+(big?16:12)}" font-family="Nunito" font-size="6" font-weight="700" fill="${c.ltext}" text-anchor="middle">${f.size}</text></g>`;
        }).join('');
        return `<svg viewBox="0 0 490 375" xmlns="http://www.w3.org/2000/svg" class="venue-svg"><rect width="490" height="375" fill="#3a4a36"/><rect x="20" y="12" width="370" height="330" rx="5" fill="#2a3826" opacity="0.7"/><rect x="22" y="80" width="108" height="260" rx="2" fill="#4a4a42" opacity="0.75"/><text x="76" y="225" font-family="Nunito" font-size="9" font-weight="700" fill="rgba(255,255,255,0.2)" text-anchor="middle" transform="rotate(-90 76 225)" letter-spacing="2">PARKING</text><rect x="138" y="193" width="190" height="14" fill="#5a5a48" opacity="0.6"/><rect x="326" y="80" width="14" height="240" fill="#5a5a48" opacity="0.5"/><rect x="318" y="248" width="172" height="120" rx="5" fill="#2a3826" opacity="0.7"/><rect x="484" y="0" width="6" height="375" fill="#5a5850" opacity="0.8"/><rect x="112" y="207" width="24" height="14" rx="2" fill="#1e3a8a"/><text x="124" y="217" font-family="Nunito" font-size="7" font-weight="900" fill="white" text-anchor="middle">HQ</text><circle cx="120" cy="160" r="9" fill="#dc2626" opacity="0.9"/><text x="120" y="164" font-family="Nunito" font-size="11" font-weight="900" fill="white" text-anchor="middle">+</text><text x="477" y="190" font-family="Nunito" font-size="7" fill="rgba(255,255,255,0.25)" text-anchor="middle" transform="rotate(90 477 190)" letter-spacing="1">COIT RD</text>${svgFields}<rect x="0" y="358" width="490" height="17" fill="rgba(0,0,0,0.35)"/><rect x="8" y="362" width="9" height="9" rx="1" fill="#00234b" stroke="#ffcc00" stroke-width="1.5"/><text x="21" y="370" font-family="Nunito" font-size="7.5" fill="rgba(255,255,255,0.6)">Our Games</text><rect x="88" y="362" width="9" height="9" rx="1" fill="#7c3f00" stroke="#ffcc00" stroke-width="1.5"/><text x="101" y="370" font-family="Nunito" font-size="7.5" fill="rgba(255,255,255,0.6)">Final</text><rect x="140" y="362" width="9" height="9" rx="1" fill="#1a3a6b" stroke="#93c5fd" stroke-width="1.5"/><text x="153" y="370" font-family="Nunito" font-size="7.5" fill="rgba(255,255,255,0.6)">Semis</text><rect x="196" y="362" width="9" height="9" rx="1" fill="#1a5c30" stroke="rgba(255,255,255,0.4)" stroke-width="1"/><text x="209" y="370" font-family="Nunito" font-size="7.5" fill="rgba(255,255,255,0.6)">Other Fields</text><text x="482" y="370" font-family="Nunito" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="end">6701 Coit Rd · Plano TX 75024</text></svg>`;
    }

    function showMapField(letter) {
        document.querySelectorAll('.mf-rect').forEach(function(r){r.style.filter='';});
        var sel=document.getElementById('mf-'+letter);
        if(sel) sel.style.filter='brightness(1.5) drop-shadow(0 0 6px rgba(255,204,0,0.9))';
        var games=mapFieldGames[letter]||[];
        var el=document.getElementById('mapFieldInfo');
        if(!el) return;
        if(!games.length){
            el.className='vfi vfi-empty';
            el.innerHTML='<span>No games on Field <strong>'+letter+'</strong>'+(tournMapDay&&tournMapDay!=='All'?' on '+tournMapDay:'')+' this day</span>';
            return;
        }
        el.className='vfi';
        el.innerHTML='<div class="vfi-field-title">Field '+letter+'</div>'+
            games.map(function(g){
                return '<div class="vfi-game'+(g.isOurs?' vfi-ours':'')+'">'+'<div class="vfi-label">'+(g.isOurs?'⭐ ':'')+g.label+'</div>'+'<div class="vfi-teams">'+g.home+'<span class="vfi-vs">vs</span>'+g.away+'</div>'+'<div class="vfi-meta">'+g.date+' · '+g.time+(g.score?' &nbsp;·&nbsp; <strong>'+g.score+'</strong>':'')+' </div></div>';
            }).join('');
    }




    function enhanceStoryWithAI() {
        var btn = document.getElementById('aiStoryBtn');
        var resultBox = document.getElementById('storyAiResult');
        if (!btn || !resultBox) return;
        btn.disabled = true;
        btn.innerHTML = '<span class="ai-spinner"></span> Writing...';
        resultBox.style.display = 'none';

        var r = TEAM_CONFIG.record;
        var l = TEAM_CONFIG.league;
        var nm = TEAM_CONFIG.nextMatch;
        var streak = getStreak(TEAM_CONFIG.matches);
        var avail = TEAM_CONFIG.remainingSchedule.length * 3;
        var streakLabel = streak.count + '-match ' + (streak.type === 'W' ? 'win' : streak.type === 'L' ? 'losing' : 'unbeaten') + ' streak';

        callAI(
            'You are a sports broadcast journalist writing dramatic weekly season recaps for youth soccer teams. Write in an energetic narrative style like a Friday Night Lights broadcast recap. Use vivid language, build tension, make it feel cinematic. Under 200 words. Plain text only, no bullet points, no markdown.',
            'Team: ' + TEAM_CONFIG.branding.name + '. Division: ' + TEAM_CONFIG.branding.league + '. Record: ' + r.wins + 'W-' + r.losses + 'L-' + r.draws + 'D. Rank: #' + l.rank + ' of ' + l.totalTeams + '. Points: ' + l.points + '. PPG: ' + l.ppg + '. Goal diff: ' + l.goalDiff + '. Goals: ' + TEAM_CONFIG.goals.for + ' scored, ' + TEAM_CONFIG.goals.against + ' conceded. Streak: ' + streakLabel + '. Remaining: ' + TEAM_CONFIG.remainingSchedule.length + ' games (' + avail + ' pts available). Next: #' + nm.oppRank + ' ' + nm.oppName + ' (' + nm.oppRecord + '). Write a dramatic broadcast-style season story.'
        ).then(function(result) {
            storyAiText[currentTeamId] = result;
            var el = document.getElementById('storyNarrativeText');
            if (el) el.innerHTML = result.split('\n\n').join('</p><p class="story-narrative" style="margin-top:12px;">');
            btn.disabled = false;
            btn.innerHTML = '&#10022; Regenerate';
        }).catch(function(err) {
            resultBox.textContent = 'Error: ' + err.message;
            resultBox.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '&#10022; Enhance with AI';
        });
    }


    function render() {
        renderNavBars();
        const c = document.getElementById('main-content');
        if (currentTab === 'home')           renderHome(c);
        else if (currentTab === 'story')     renderStory(c);
        else if (currentTab === 'schedule')  renderSchedule(c);
        else if (currentTab === 'tournament') renderTournament(c);
        else if (currentTab === 'tactics')   renderTactics(c);
        else renderHome(c);
    }

    /* ============================================================
       BOOT
    ============================================================ */
    updateCheckinStreak();
    applyTheme();
    renderTeamSwitcher();
    renderSeasonPulse();
    render();
    </script>
